}

// ── App Password Gate ─────────────────────────────────────────
const APP_PW_KEY = 'habits_app_pw';
function getAppPassword() {
  try { const s = localStorage.getItem('habits_settings'); if(s) { const p = JSON.parse(s); if(p.appPassword) return p.appPassword; } } catch(e){}
  return 'familie';
}
function setAppPassword(pw) {
  try { const s = localStorage.getItem('habits_settings'); const obj = s ? JSON.parse(s) : {}; obj.appPassword = pw; localStorage.setItem('habits_settings', JSON.stringify(obj)); } catch(e){}
}

function LoginScreen({ onLogin }) {
  const [val, setVal] = useState('');
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);

  const submit = (e) => {
    e && e.preventDefault();
    if(val === getAppPassword()) {
      sessionStorage.setItem(APP_PW_KEY, '1');
      onLogin();
    } else {
      setError(true);
      setVal('');
      setTimeout(() => setError(false), 1200);
    }
  };

  return (
    <div style={{
      width:'100%', height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', background:'var(--bg)',
      fontFamily:'Nunito, sans-serif', padding:32,
    }}>
      <div style={{width:'100%', maxWidth:360, animation:'fadeUp 0.5s ease'}}>
        {/* Logo area */}
        <div style={{textAlign:'center', marginBottom:40}}>
          <div style={{fontSize:56, marginBottom:12}}>🏠✨</div>
          <div style={{fontWeight:900, fontSize:26, color:'var(--text)'}}>Haushalts-Punkte</div>
          <div style={{fontWeight:600, fontSize:14, color:'var(--text-3)', marginTop:6}}>
            Für Daniil & Viktoria
          </div>
        </div>

        <form onSubmit={submit}>
          <div style={{
            background:'#fff', borderRadius:24, padding:24, boxShadow:'var(--shadow-lg)',
            border: error ? '2px solid var(--v-color)' : '2px solid var(--border)',
            transition:'border-color 0.2s', animation: error ? 'shake 0.4s ease' : 'none',
          }}>
            <div style={{fontWeight:800, fontSize:15, color:'var(--text)', marginBottom:16, textAlign:'center'}}>
              🔐 Bitte einloggen
            </div>
            <div style={{position:'relative', marginBottom:16}}>
              <input
                autoFocus
                type={show ? 'text' : 'password'}
                value={val}
                onChange={e => setVal(e.target.value)}
                placeholder="Passwort eingeben"
                style={{
                  width:'100%', padding:'14px 48px 14px 16px', borderRadius:14,
                  border:'1.5px solid var(--border)', background:'var(--bg)',
                  fontFamily:'Nunito', fontWeight:700, fontSize:16, color:'var(--text)',
                  outline:'none', boxSizing:'border-box',
                  borderColor: error ? 'var(--v-color)' : 'var(--border)',
                }}
              />
              <button type="button" onClick={()=>setShow(s=>!s)} style={{
                position:'absolute', right:12, top:'50%', transform:'translateY(-50%)',
                background:'none', border:'none', cursor:'pointer', fontSize:18, padding:4,
              }}>{show ? '🙈' : '👁️'}</button>
            </div>
            {error && (
              <div style={{textAlign:'center', fontSize:13, fontWeight:700, color:'var(--v-color)', marginBottom:12}}>
                ❌ Falsches Passwort
              </div>
            )}
            <button type="submit" style={{
              width:'100%', padding:'14px', borderRadius:14, border:'none',
              background:'var(--d-color)', color:'#fff',
              fontFamily:'Nunito', fontWeight:900, fontSize:16, cursor:'pointer',
              transition:'opacity 0.2s',
            }}>Einloggen →</button>
          </div>
        </form>

        <div style={{textAlign:'center', marginTop:20, fontSize:12, fontWeight:600, color:'var(--text-3)'}}>
          Standard-Passwort: <strong>familie</strong>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(() => sessionStorage.getItem(APP_PW_KEY) === '1');
  const [state, setStateRaw] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('home');
  const [activeKid, setActiveKid] = useState('daniil');
  const [showPin, setShowPin] = useState(false);
  const [parentMode, setParentMode] = useState(false);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      const cur = getWeekKey();
      const final = next.weekKey !== cur
        ? { ...next, weekKey: cur, completions: {daniil:{}, viktoria:{}} }
        : next;
      saveState(final);
      return final;
    });
  }, []);

  useEffect(() => {
    // Firebase immer starten — unabhängig vom Login-Status
    const timeout = setTimeout(() => {
      setStateRaw(s => s || defaultState());
      setLoading(false);
    }, 8000);

    let handler;
    try {
      handler = fbRef.on('value', snapshot => {
        clearTimeout(timeout);
        const raw = snapshot.val();
        const cur = getWeekKey();
        if (!raw) {
          const def = defaultState();
          fbRef.set(def);
          setStateRaw(def);
        } else {
          // Firebase löscht leere Objekte — immer wiederherstellen
          const data = {
            ...raw,
            tasks: raw.tasks || TASKS_DEF,
            penaltyDefs: raw.penaltyDefs || PENALTIES_DEF,
            kidTaskData: raw.kidTaskData || { daniil:{}, viktoria:{} },
            settings: { pin:'1234', prize1:'5', prize2:'2', bonus:'10', ...(raw.settings||{}) },
            completions: {
              daniil:  (raw.completions && raw.completions.daniil)  || {},
              viktoria:(raw.completions && raw.completions.viktoria) || {},
            },
            penalties: {
              daniil:  (raw.penalties && raw.penalties.daniil)  || {},
              viktoria:(raw.penalties && raw.penalties.viktoria) || {},
            },
          };
          if (data.weekKey !== cur) {
            const reset = { ...data, weekKey: cur, completions: {daniil:{}, viktoria:{}}, penalties: {daniil:{}, viktoria:{}} };
            fbRef.set(reset);
            setStateRaw(reset);
          } else {
            setStateRaw(prev => {
              if (JSON.stringify(prev) === JSON.stringify(data)) return prev;
              return data;
            });
          }
        }
        setLoading(false);
      }, err => {
        clearTimeout(timeout);
        setStateRaw(defaultState());
        setLoading(false);
      });
    } catch(e) {
      clearTimeout(timeout);
      setStateRaw(defaultState());
      setLoading(false);
    }
    return () => { clearTimeout(timeout); try { fbRef.off('value', handler); } catch(e){} };
  }, []);

  if(!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)}/>;

  if (loading) return (
    <div style={{width:'100%', height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', background:'var(--bg)', gap:16}}>
      <div style={{fontSize:48}}>🏠</div>
      <div style={{fontWeight:800, fontSize:16, color:'var(--text)'}}>Wird geladen…</div>
      <div style={{width:48, height:48, border:'4px solid var(--border)',
        borderTop:'4px solid var(--d-color)', borderRadius:'50%',
        animation:'spin 0.8s linear infinite'}}/>
    </div>
  );

  const pendingCount = KIDS.reduce((s,k)=>s+getKidPending(state.completions,k.id,state.weekKey,state.tasks).length, 0);

  return (
    <div style={{
      width:'100%', height:'100%', background:'var(--bg)', fontFamily:'Nunito, sans-serif',
      display:'flex', flexDirection:'column', overflow:'hidden', position:'relative',
    }}>
      {/* Top Bar */}
      <div style={{
        padding:'8px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between',
        paddingTop:'max(8px, env(safe-area-inset-top, 8px))',
        flexShrink:0,
      }}>
        <div>
          <div style={{fontWeight:900, fontSize:18, color:'var(--text)'}}>
            {{home:'Übersicht',tasks:'Aufgaben',rank:'Rangliste',calendar:'Kalender'}[tab]}
          </div>
          {(() => {
            const n = new Date();
            const wdn = ['So','Mo','Di','Mi','Do','Fr','Sa'][n.getDay()];
            const mn = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'][n.getMonth()];
            return <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)', marginTop:1}}>{wdn}, {n.getDate()}. {mn}</div>;
          })()}
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {tab!=='rank' && KIDS.map(k=>(
            <div key={k.id} onClick={()=>setActiveKid(k.id)} style={{
              padding:'6px 14px', borderRadius:20,
              background: activeKid===k.id ? k.color : 'var(--bg)',
              color: activeKid===k.id ? '#fff' : 'var(--text-2)',
              fontWeight:700, fontSize:13, cursor:'pointer', transition:'all 0.2s',
              boxShadow: activeKid===k.id ? `0 4px 12px ${k.color}44` : 'none',
            }}>{k.name}</div>
          ))}
          {/* Parent lock button */}
          <div onClick={()=>setShowPin(true)} style={{
            width:34, height:34, borderRadius:12, background:'var(--bg)',
            display:'flex', alignItems:'center', justifyContent:'center',
            cursor:'pointer', fontSize:16, position:'relative',
          }}>
            🔒
            {pendingCount>0 && (
              <div style={{position:'absolute', top:-4, right:-4, width:16, height:16, borderRadius:'50%',
                background:'var(--orange)', color:'#fff', fontSize:9, fontWeight:900,
                display:'flex', alignItems:'center', justifyContent:'center'}}>
                {pendingCount}
              </div>
            )}
          </div>
        </div>
      </div>

      <div style={{flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch'}}>
        {tab==='home'     && <HomeScreen  state={state} activeKid={activeKid} setActiveKid={setActiveKid}/>}
        {tab==='tasks'    && <TasksScreen state={state} setState={setState} activeKid={activeKid}/>}
        {tab==='rank'     && <LeaderboardScreen state={state}/>}
        {tab==='calendar' && <CalendarScreen state={state} activeKid={activeKid}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab} activeKid={activeKid}/>

      {showPin && (
        <PinModal
          correctPin={state.settings.pin}
          onSuccess={()=>{ setShowPin(false); setParentMode(true); }}
          onCancel={()=>setShowPin(false)}
        />
      )}

      {parentMode && (
        <ParentScreen state={state} setState={setState} onClose={()=>setParentMode(false)}/>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:24, fontFamily:'Nunito', background:'#fff5f5', minHeight:'100vh'}}>
        <div style={{fontSize:32, marginBottom:12}}>⚠️</div>
        <div style={{fontWeight:900, fontSize:18, color:'#dc2626', marginBottom:8}}>App-Fehler</div>
        <pre style={{fontSize:12, color:'#7f1d1d', whiteSpace:'pre-wrap', background:'#fef2f2', padding:12, borderRadius:8}}>
          {this.state.error.toString()}
        </pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
