<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Data ──────────────────────────────────────────────────────
const TASKS_DEF = [
  { id:'dish',    icon:'🍽️', label:'Geschirrspüler ausräumen', pts:5  },
  { id:'room',    icon:'🛏️', label:'Zimmer aufräumen',          pts:10 },
  { id:'trash',   icon:'🗑️', label:'Müll rausbringen',          pts:8  },
  { id:'lawn',    icon:'🌿', label:'Rasen mähen',               pts:20 },
  { id:'vacuum',  icon:'🧹', label:'Staubsaugen',               pts:15 },
  { id:'laundry', icon:'👕', label:'Wäsche aushängen',          pts:10 },
];
const MAX_PTS = TASKS_DEF.reduce((s,t) => s+t.pts, 0);

const PENALTIES_DEF = [
  { id:'p_bed',      icon:'🛌', label:'Bett nicht gemacht',              pts:5  },
  { id:'p_table',    icon:'🍽️', label:'Tisch nicht aufgeräumt',          pts:5  },
  { id:'p_homework', icon:'📚', label:'Hausaufgaben vergessen',           pts:10 },
  { id:'p_phone',    icon:'📱', label:'Handy beim Essen',                 pts:5  },
  { id:'p_light',    icon:'💡', label:'Licht angelassen',                 pts:3  },
  { id:'p_clothes',  icon:'👔', label:'Schmutzige Wäsche nicht im Korb', pts:3  },
];
const KIDS = [
  { id:'daniil',   name:'Daniil',   emoji:'🏆', color:'var(--d-color)', light:'var(--d-light)', mid:'var(--d-mid)' },
  { id:'viktoria', name:'Viktoria', emoji:'⭐', color:'var(--v-color)', light:'var(--v-light)', mid:'var(--v-mid)' },
];

function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  const mon = new Date(d); mon.setDate(diff);
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}

function defaultState() {
  return {
    weekKey: getWeekKey(),
    completions: { daniil:{}, viktoria:{} },
    penalties:   { daniil:{}, viktoria:{} },
    settings: { pin:'1234', prize1:'5', prize2:'2' },
    tasks: TASKS_DEF,
    penaltyDefs: PENALTIES_DEF,
  };
}
function saveState(s) {
  fbRef.set(s);
}

function getKidPts(completions, kidId, weekKey, tasks) {
  return tasks.filter(t => completions[kidId]?.[t.id] === weekKey+'_confirmed').reduce((s,t)=>s+t.pts,0);
}
function getKidPenaltyPts(penalties, kidId, weekKey, penaltyDefs) {
  return (penaltyDefs||[]).filter(p => penalties?.[kidId]?.[p.id] === weekKey+'_confirmed').reduce((s,p)=>s+p.pts,0);
}
function getKidNetPts(completions, penalties, kidId, weekKey, tasks, penaltyDefs) {
  return Math.max(0, getKidPts(completions, kidId, weekKey, tasks) - getKidPenaltyPts(penalties, kidId, weekKey, penaltyDefs));
}
function getKidPending(completions, kidId, weekKey, tasks) {
  return tasks.filter(t => completions[kidId]?.[t.id] === weekKey+'_pending');
}
function getKidConfirmed(completions, kidId, weekKey, tasks) {
  return tasks.filter(t => completions[kidId]?.[t.id] === weekKey+'_confirmed');
}
function getKidActivePenalties(penalties, kidId, weekKey, penaltyDefs) {
  return (penaltyDefs||[]).filter(p => penalties?.[kidId]?.[p.id] === weekKey+'_confirmed');
}

// ── Confetti ──────────────────────────────────────────────────
function Confetti({ x, y, color, onDone }) {
  const pieces = ['★','●','■','◆','▲','✦'];
  const colors = [color, '#FFD700', '#FF9EBC', '#A0D9FF', '#C4F0C5', '#FFC49B'];
  useEffect(() => { const t = setTimeout(onDone, 1100); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed', left:x, top:y, pointerEvents:'none', zIndex:9999}}>
      {Array.from({length:16}).map((_,i) => (
        <span key={i} style={{
          position:'absolute', fontSize:10+Math.random()*10,
          color: colors[i%colors.length],
          left:(Math.random()-0.5)*100, top:0,
          animation:`confettiFall ${0.65+Math.random()*0.5}s ease-out forwards`,
          animationDelay:`${Math.random()*0.25}s`,
        }}>{pieces[i%pieces.length]}</span>
      ))}
    </div>
  );
}

function FloatingPts({ pts, color }) {
  return (
    <div style={{
      position:'absolute', top:-10, right:10, zIndex:100,
      fontFamily:'Nunito', fontWeight:900, fontSize:17, color,
      animation:'starFloat 0.9s ease-out forwards', pointerEvents:'none',
    }}>+{pts}✨</div>
  );
}

// ── Ring ──────────────────────────────────────────────────────
function Ring({ pct, size=64, stroke=7, label }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, dash=circ*Math.min(pct,1);
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:'stroke-dasharray 0.6s ease'}}/>
      <foreignObject x={0} y={0} width={size} height={size}>
        <div xmlns="http://www.w3.org/1999/xhtml"
          style={{width:size, height:size, display:'flex', alignItems:'center', justifyContent:'center',
            transform:'rotate(90deg)', fontSize:11, fontWeight:800, color:'#fff', fontFamily:'Nunito'}}>
          {label}
        </div>
      </foreignObject>
    </svg>
  );
}

// ── PIN Modal ─────────────────────────────────────────────────
function PinModal({ onSuccess, onCancel, correctPin }) {
  const [val, setVal] = useState('');
  const [error, setError] = useState(false);
  const digits = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  const press = (d) => {
    if(d==='') return;
    if(d==='⌫') { setVal(v=>v.slice(0,-1)); return; }
    const next = val + d;
    if(next.length <= 4) {
      setVal(next);
      if(next.length===4) {
        if(next === correctPin) { setTimeout(()=>onSuccess(), 150); }
        else { setError(true); setTimeout(()=>{ setVal(''); setError(false); }, 700); }
      }
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:500,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end',
    }} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#fff', borderRadius:'28px 28px 0 0', padding:'28px 24px 40px',
        width:'100%', maxWidth:480, animation:'slideUp 0.3s ease',
        paddingBottom:'max(40px, env(safe-area-inset-bottom, 40px))',
      }}>
        <div style={{textAlign:'center', marginBottom:24}}>
          <div style={{fontSize:28, marginBottom:8}}>🔒</div>
          <div style={{fontWeight:900, fontSize:18, color:'var(--text)'}}>Eltern-Modus</div>
          <div style={{fontWeight:600, fontSize:13, color:'var(--text-3)', marginTop:4}}>PIN eingeben</div>
        </div>
        {/* Dots */}
        <div style={{display:'flex', gap:16, justifyContent:'center', marginBottom:28, animation: error?'shake 0.4s ease':'none'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{
              width:16, height:16, borderRadius:'50%',
              background: i<val.length ? (error?'var(--v-color)':'var(--d-color)') : 'var(--border)',
              transition:'background 0.15s',
            }}/>
          ))}
        </div>
        {/* Numpad */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12}}>
          {digits.map((d,i)=>(
            <button key={i} onClick={()=>press(d)} style={{
              height:60, borderRadius:16, border:'none',
              background: d==='' ? 'transparent' : 'var(--bg)',
              fontSize: d==='⌫' ? 20 : 24, fontWeight:700, fontFamily:'Nunito',
              color:'var(--text)', cursor: d===''?'default':'pointer',
              transition:'transform 0.1s, background 0.1s',
            }}>{d}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App Password Changer (used inside Parent Settings) ────────
function AppPasswordChanger() {
  const [val, setVal] = useState(getAppPassword());
  const [saved, setSaved] = useState(false);
  const save = () => {
    if(val.trim().length >= 3) {
      setAppPassword(val.trim());
      setSaved(true);
      setTimeout(() => setSaved(false), 1800);
    }
  };
  return (
    <div style={{display:'flex', gap:10, alignItems:'center'}}>
      <input
        type="text" value={val} onChange={e=>setVal(e.target.value)}
        style={{
          flex:1, padding:'10px 14px', borderRadius:12,
          border:'1.5px solid var(--border)', background:'var(--bg)',
          fontFamily:'Nunito', fontWeight:700, fontSize:15, color:'var(--text)', outline:'none',
        }}
      />
      <button onClick={save} style={{
        padding:'10px 16px', borderRadius:12, border:'none',
        background: saved ? 'var(--green)' : 'var(--d-color)', color:'#fff',
        fontFamily:'Nunito', fontWeight:800, fontSize:14, cursor:'pointer', transition:'background 0.2s',
      }}>{saved ? '✓' : 'Speichern'}</button>
    </div>
  );
}

// ── Penalty Manager ───────────────────────────────────────────
function PenaltyManager({ state, setState }) {
  const week = state.weekKey;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;
  const [customLabel, setCustomLabel] = useState({});
  const [customPts, setCustomPts] = useState({});

  const togglePenalty = (kidId, penaltyId) => {
    setState(prev => {
      const cur = prev.penalties?.[kidId]?.[penaltyId];
      const kidPenalties = { ...(prev.penalties?.[kidId] || {}) };
      if (cur === week+'_confirmed') { delete kidPenalties[penaltyId]; }
      else { kidPenalties[penaltyId] = week+'_confirmed'; }
      const next = { ...prev, penalties: { ...(prev.penalties||{}), [kidId]: kidPenalties } };
      saveState(next); return next;
    });
  };

  const addCustomPenalty = (kidId) => {
    const label = (customLabel[kidId] || '').trim();
    const pts = Math.max(1, parseInt(customPts[kidId]) || 5);
    if (!label) return;
    const id = 'custom_' + kidId + '_' + Date.now();
    setState(prev => {
      const newDef = { id, icon: '⚡', label, pts, kidId };
      const newDefs = [...(prev.penaltyDefs || PENALTIES_DEF), newDef];
      const kidPenalties = { ...(prev.penalties?.[kidId] || {}), [id]: week+'_confirmed' };
      const next = { ...prev, penaltyDefs: newDefs, penalties: { ...(prev.penalties||{}), [kidId]: kidPenalties } };
      saveState(next); return next;
    });
    setCustomLabel(prev => ({ ...prev, [kidId]: '' }));
    setCustomPts(prev => ({ ...prev, [kidId]: '' }));
  };

  const removeCustomPenalty = (kidId, penaltyId) => {
    setState(prev => {
      const newDefs = (prev.penaltyDefs || PENALTIES_DEF).filter(p => p.id !== penaltyId);
      const kidPenalties = { ...(prev.penalties?.[kidId] || {}) };
      delete kidPenalties[penaltyId];
      const next = { ...prev, penaltyDefs: newDefs, penalties: { ...(prev.penalties||{}), [kidId]: kidPenalties } };
      saveState(next); return next;
    });
  };

  return (
    <div>
      {KIDS.map(kid => {
        const standardDefs = penaltyDefs.filter(p => !p.kidId);
        const customDefs = penaltyDefs.filter(p => p.kidId === kid.id);
        const active = getKidActivePenalties(state.penalties, kid.id, week, penaltyDefs);
        const totalPts = active.reduce((s,p)=>s+p.pts,0);
        return (
          <div key={kid.id} style={{marginBottom:24}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
              <div style={{width:36, height:36, borderRadius:'50%', background:kid.color,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, color:'#fff'}}>{kid.emoji}</div>
              <div style={{fontWeight:800, fontSize:15, color:'var(--text)', flex:1}}>{kid.name}</div>
              {totalPts>0 && <div style={{fontWeight:900, fontSize:14, color:'#dc2626'}}>-{totalPts} P</div>}
            </div>

            {/* Standard penalty toggles */}
            <div style={{display:'flex', flexDirection:'column', gap:8}}>
              {standardDefs.map(p => {
                const isActive = state.penalties?.[kid.id]?.[p.id] === week+'_confirmed';
                return (
                  <div key={p.id} onClick={()=>togglePenalty(kid.id, p.id)} style={{
                    display:'flex', alignItems:'center', gap:12, padding:'12px 14px',
                    borderRadius:16, cursor:'pointer', transition:'all 0.2s',
                    background: isActive ? '#fee2e2' : '#fff',
                    border: `1.5px solid ${isActive ? '#fca5a5' : 'var(--border)'}`,
                  }}>
                    <span style={{fontSize:20}}>{p.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700, fontSize:13, color: isActive?'#7f1d1d':'var(--text)'}}>{p.label}</div>
                      <div style={{fontWeight:600, fontSize:11, color:'#dc2626'}}>-{p.pts} Punkte</div>
                    </div>
                    <div style={{
                      width:26, height:26, borderRadius:'50%', flexShrink:0,
                      background: isActive ? '#dc2626' : 'var(--bg)',
                      border: `2px solid ${isActive ? '#dc2626' : 'var(--border)'}`,
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>
                      {isActive && <span style={{color:'#fff', fontSize:13, fontWeight:900}}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Custom (manual) penalties already added for this kid */}
            {customDefs.length > 0 && (
              <div style={{display:'flex', flexDirection:'column', gap:8, marginTop:8}}>
                {customDefs.map(p => (
                  <div key={p.id} style={{
                    display:'flex', alignItems:'center', gap:12, padding:'12px 14px',
                    borderRadius:16, background:'#fee2e2', border:'1.5px solid #fca5a5',
                  }}>
                    <span style={{fontSize:20}}>⚡</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700, fontSize:13, color:'#7f1d1d'}}>{p.label}</div>
                      <div style={{fontWeight:600, fontSize:11, color:'#dc2626'}}>-{p.pts} Punkte (manuell)</div>
                    </div>
                    <button onClick={()=>removeCustomPenalty(kid.id, p.id)} style={{
                      background:'#dc2626', border:'none', borderRadius:'50%', width:26, height:26,
                      color:'#fff', fontSize:14, fontWeight:900, cursor:'pointer', flexShrink:0,
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {/* Form to add a manual penalty */}
            <div style={{marginTop:10, padding:'12px 14px', background:'#fff7ed',
              borderRadius:16, border:'1.5px dashed #fb923c'}}>
              <div style={{fontWeight:800, fontSize:12, color:'#9a3412', marginBottom:8}}>⚡ Eigene Strafe hinzufügen</div>
              <input
                placeholder="Beschreibung der Strafe..."
                value={customLabel[kid.id] || ''}
                onChange={e => setCustomLabel(prev => ({ ...prev, [kid.id]: e.target.value }))}
                onKeyDown={e => e.key==='Enter' && addCustomPenalty(kid.id)}
                style={{width:'100%', boxSizing:'border-box', padding:'9px 12px', borderRadius:10,
                  border:'1.5px solid #fed7aa', fontFamily:'Nunito', fontSize:13, fontWeight:600,
                  outline:'none', background:'#fff', color:'var(--text)', marginBottom:8}}
              />
              <div style={{display:'flex', gap:8}}>
                <input
                  type="number" min="1" placeholder="Punkte"
                  value={customPts[kid.id] || ''}
                  onChange={e => setCustomPts(prev => ({ ...prev, [kid.id]: e.target.value }))}
                  onKeyDown={e => e.key==='Enter' && addCustomPenalty(kid.id)}
                  style={{width:90, padding:'9px 12px', borderRadius:10, border:'1.5px solid #fed7aa',
                    fontFamily:'Nunito', fontSize:13, fontWeight:700, outline:'none', background:'#fff', color:'var(--text)'}}
                />
                <button onClick={() => addCustomPenalty(kid.id)} style={{
                  flex:1, padding:'9px 0', borderRadius:10, border:'none', background:'#dc2626',
                  color:'#fff', fontFamily:'Nunito', fontWeight:800, fontSize:13, cursor:'pointer',
                }}>Hinzufügen</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Task Manager (inside Parent Settings) ────────────────────
function TaskManager({ state, setState }) {
  const [icon, setIcon] = useState('⭐');
  const [label, setLabel] = useState('');
  const [pts, setPts] = useState('5');
  const [saved, setSaved] = useState(false);
  const tasks = state.tasks;

  const addTask = () => {
    if(!label.trim()) return;
    const newTask = { id: 'custom_' + Date.now(), icon: icon.trim() || '⭐', label: label.trim(), pts: Math.max(1, parseInt(pts)||5) };
    setState(prev => {
      const next = { ...prev, tasks: [...prev.tasks, newTask] };
      saveState(next); return next;
    });
    setLabel(''); setPts('5'); setIcon('⭐');
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  };

  const removeTask = (id) => {
    setState(prev => {
      const next = { ...prev, tasks: prev.tasks.filter(t => t.id !== id) };
      saveState(next); return next;
    });
  };

  const updatePts = (id, val) => {
    setState(prev => {
      const next = { ...prev, tasks: prev.tasks.map(t => t.id===id ? {...t, pts: Math.max(1, parseInt(val)||1)} : t) };
      saveState(next); return next;
    });
  };

  return (
    <div>
      {/* Existing tasks */}
      <div style={{background:'#fff', borderRadius:20, padding:'4px 0', boxShadow:'var(--shadow)', marginBottom:16}}>
        {tasks.map((task, i) => (
          <div key={task.id} style={{display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
            borderBottom: i<tasks.length-1 ? '1px solid var(--border)' : 'none'}}>
            <span style={{fontSize:22, width:32, textAlign:'center'}}>{task.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700, fontSize:13, color:'var(--text)'}}>{task.label}</div>
            </div>
            <input type="number" min="1" value={task.pts}
              onChange={e => updatePts(task.id, e.target.value)}
              style={{width:48, border:'1.5px solid var(--border)', borderRadius:8, padding:'4px 6px',

// ── Parent Mode Screen ────────────────────────────────────────
function ParentScreen({ state, setState, onClose }) {
  const [confettis, setConfettis] = useState([]);
  const week = state.weekKey;
  const tasks = state.tasks;
  const [tab, setTab] = useState('pending');

  const allPending = KIDS.flatMap(k =>
    getKidPending(state.completions, k.id, week, tasks).map(t => ({...t, kid: k}))
  );

  const confirm = (kidId, taskId, e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setConfettis(c => [...c, { id: Date.now()+taskId, x: rect.left+rect.width/2, y: rect.top, color: KIDS.find(k=>k.id===kidId).color }]);
    setState(prev => {
      const comp = { ...prev.completions[kidId], [taskId]: week+'_confirmed' };
      const next = { ...prev, completions: { ...prev.completions, [kidId]: comp } };
      saveState(next); return next;
    });
  };

  const reject = (kidId, taskId) => {
    setState(prev => {
      const comp = { ...prev.completions[kidId] };
      delete comp[taskId];
      const next = { ...prev, completions: { ...prev.completions, [kidId]: comp } };
      saveState(next); return next;
    });
  };

  const updatePrize = (key, val) => {
    setState(prev => {
      const next = { ...prev, settings: { ...prev.settings, [key]: val } };
      saveState(next); return next;
    });
  };

  const updatePin = (val) => {
    if(val.length <= 4 && /^\d*$/.test(val)) {
      setState(prev => {
        const next = { ...prev, settings: { ...prev.settings, pin: val } };
        saveState(next); return next;
      });
    }
  };

  const scores = KIDS.map(k => ({
    ...k,
    pts: getKidPts(state.completions, k.id, week, tasks),
    pending: getKidPending(state.completions, k.id, week, tasks).length,
    confirmed: getKidConfirmed(state.completions, k.id, week, tasks).length,

  return (
    <div style={{position:'fixed', inset:0, background:'var(--bg)', zIndex:400, display:'flex', flexDirection:'column', overflow:'hidden'}}>
      {confettis.map(c => <Confetti key={c.id} x={c.x} y={c.y} color={c.color} onDone={()=>setConfettis(p=>p.filter(x=>x.id!==c.id))}/>)}

      {/* Header */}
      <div style={{background:'#fff', padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:14,
        paddingTop:'max(16px, env(safe-area-inset-top, 16px))'}}>
        <button onClick={onClose} style={{background:'var(--bg)', border:'none', borderRadius:12, width:36, height:36, fontSize:18, cursor:'pointer'}}>←</button>
        <div>
          <div style={{fontWeight:900, fontSize:17, color:'var(--text)'}}>🔓 Eltern-Modus</div>
          <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)'}}>Aufgaben bestätigen & Einstellungen</div>
        </div>
      </div>

      {/* Sub Tabs */}
      <div style={{background:'#fff', padding:'0 20px 12px', display:'flex', gap:8, borderBottom:'1px solid var(--border)'}}>
        {[{id:'pending',label:`⏳ Ausstehend (${allPending.length})`},{id:'penalties',label:'⚡ Strafen'},{id:'tasks',label:'📋 Aufgaben'},{id:'settings',label:'⚙️ Einstellungen'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px', borderRadius:20, border:'none', fontFamily:'Nunito', fontWeight:700, fontSize:12, cursor:'pointer',
            background: tab===t.id ? 'var(--d-color)' : 'var(--bg)',
            color: tab===t.id ? '#fff' : 'var(--text-2)',
            transition:'all 0.2s',
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1, overflowY:'auto', padding:'16px 20px', WebkitOverflowScrolling:'touch'}}>
        {tab==='pending' && (
          <div>
            {allPending.length === 0 ? (

                <div style={{fontSize:48, marginBottom:12}}>✅</div>
                <div style={{fontWeight:800, fontSize:17, color:'var(--text)'}}>Alles bestätigt!</div>

                        <div style={{display:'flex', alignItems:'center', gap:6, marginTop:3}}>

                    <div style={{display:'flex', gap:8}}>

                <div key={k.id} style={{background:'#fff', borderRadius:18, padding:'14px 16px', marginBottom:10,
                  border:`1.5px solid ${k.mid}`, animation:`fadeUp 0.3s ${i*0.1}s ease both`}}>
                  <div style={{display:'flex', alignItems:'center', gap:12}}>
                    <div style={{width:44, height:44, borderRadius:'50%', background:k.color,
                      display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, color:'#fff',
                      boxShadow:`0 4px 12px ${k.color}44`}}>{k.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800, fontSize:15, color:'var(--text)'}}>{k.name}</div>
                      <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)', marginTop:2}}>
                        {k.confirmed} bestätigt · {k.pending} ausstehend
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontWeight:900, fontSize:24, color:k.color}}>{k.pts}</div>
                      <div style={{fontWeight:600, fontSize:11, color:'var(--text-3)'}}>Punkte</div>
                    </div>
                  </div>
                  <div style={{marginTop:10, background:'var(--bg)', borderRadius:8, height:8, overflow:'hidden'}}>

// ── TaskCard ──────────────────────────────────────────────────
function TaskCard({ task, status, color, light, mid, onToggle, idx }) {
  const [floating, setFloating] = useState(false);
  const [confettiPos, setConfettiPos] = useState(null);
  const ref = useRef(null);

  const handle = () => {
    if(status !== 'confirmed') {
      if(status !== 'pending') {
        const rect = ref.current?.getBoundingClientRect();
        if(rect) setConfettiPos({x:rect.left+rect.width/2, y:rect.top+rect.height/2});
        setFloating(true); setTimeout(()=>setFloating(false),1000);
      }
      onToggle(task.id);
    }
  };

  const isPending = status==='pending', isDone = status==='confirmed';
  const bgColor = isDone ? light : isPending ? 'var(--orange-light)' : '#fff';
  const borderColor = isDone ? mid : isPending ? 'var(--orange)' : 'var(--border)';

  return (
    <div ref={ref} style={{position:'relative', animation:`fadeUp 0.35s ${idx*0.06}s ease both`}}>
      {floating && !isDone && !isPending && <FloatingPts pts={task.pts} color={color}/>}
      {confettiPos && <Confetti x={confettiPos.x} y={confettiPos.y} color={color} onDone={()=>setConfettiPos(null)}/>}
      <div onClick={handle} style={{
        display:'flex', alignItems:'center', gap:14,
        background:bgColor, border:`1.5px solid ${borderColor}`,
        borderRadius:18, padding:'14px 16px', marginBottom:10,
        cursor: isDone ? 'default' : 'pointer',
        transition:'all 0.25s', boxShadow: isDone||isPending ? 'none' : 'var(--shadow)',
      }}>
        <div style={{fontSize:26, width:42, height:42, display:'flex', alignItems:'center', justifyContent:'center',
          background: isDone ? mid : isPending ? 'var(--orange-light)' : 'var(--bg)',
          borderRadius:12, transition:'all 0.2s',
        }}>{task.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, fontSize:15, color:'var(--text)',
            textDecoration: isDone ? 'line-through' : 'none', textDecorationColor:'var(--text-3)'}}>
            {task.label}
          </div>
          <div style={{fontWeight:700, fontSize:12, marginTop:2,
            color: isDone ? color : isPending ? 'var(--orange)' : 'var(--text-3)'}}>
            {task.pts} Punkte{isPending ? ' · ⏳ Wartet auf Bestätigung' : isDone ? ' · ✓ Bestätigt' : ''}
          </div>
        </div>
        <div style={{
          width:28, height:28, borderRadius:'50%', flexShrink:0,
          border:`2px solid ${isDone ? color : isPending ? 'var(--orange)' : 'var(--border)'}`,
          background: isDone ? color : isPending ? 'var(--orange-light)' : 'transparent',
          display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.25s',
        }}>
          {isDone && <span style={{color:'#fff', fontSize:13, fontWeight:900, animation:'checkPop 0.3s ease'}}>✓</span>}
          {isPending && <span style={{fontSize:13, animation:'pendingPulse 1.5s infinite'}}>⏳</span>}
        </div>
      </div>
    </div>
  );
}

// ── Home Screen ───────────────────────────────────────────────
function HomeScreen({ state, activeKid, setActiveKid }) {
  const week = state.weekKey;
  const tasks = state.tasks;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;
  const maxPts = tasks.reduce((s,t)=>s+t.pts,0);
  const scores = KIDS.map(k => ({
    ...k,
    pts: getKidNetPts(state.completions, state.penalties, k.id, week, tasks, penaltyDefs),
    rawPts: getKidPts(state.completions, k.id, week, tasks),
    penaltyPts: getKidPenaltyPts(state.penalties, k.id, week, penaltyDefs),
    confirmed: getKidConfirmed(state.completions, k.id, week, tasks).length,
    pending: getKidPending(state.completions, k.id, week, tasks).length,
  }));
  const ak = scores.find(k=>k.id===activeKid);
  const pct = ak && maxPts > 0 ? ak.pts/maxPts : 0;
  const sortedScores = [...scores].sort((a,b)=>b.pts-a.pts);
  const leader = sortedScores[0].pts > sortedScores[1].pts ? sortedScores[0] : null;

  const days = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const todayIdx = (() => { const d=new Date().getDay(); return d===0?6:d-1; })();

  const motivText = ak?.pts===0 ? "Los geht's! 💪" : ak?.pts<20 ? 'Guter Start! 🌟' : ak?.pts<50 ? 'Super! Weiter so! 🔥' : 'Unglaublich! 🚀';

  return (
    <div style={{padding:'0 20px 20px', animation:'fadeUp 0.4s ease'}}>
      {/* Hero */}
      <div style={{
        background:`linear-gradient(135deg, ${ak?.color} 0%, ${ak?.id==='daniil'?'oklch(52% 0.22 280)':'oklch(52% 0.22 355)'} 100%)`,
        borderRadius:24, padding:'24px 22px', marginBottom:18, color:'#fff',
        boxShadow:`0 8px 32px ${ak?.color}44`, transition:'all 0.4s ease',

          <div>
            <div style={{fontSize:13, fontWeight:600, opacity:0.85, marginBottom:4}}>Bestätigte Punkte</div>
            <div style={{fontSize:46, fontWeight:900, lineHeight:1}}>{ak?.pts}</div>
            <div style={{fontSize:15, fontWeight:700, opacity:0.9, marginTop:4}}>Punkte diese Woche</div>
            {(ak?.pending||0)>0 && (
              <div style={{marginTop:8, background:'rgba(255,255,255,0.2)', borderRadius:10, padding:'5px 10px',
                fontSize:12, fontWeight:700, display:'inline-block'}}>
                ⏳ {ak.pending} warten auf Bestätigung
              </div>
            )}
            {(ak?.penaltyPts||0)>0 && (
              <div style={{marginTop:6, background:'rgba(255,0,0,0.2)', borderRadius:10, padding:'5px 10px',
                fontSize:12, fontWeight:700, display:'inline-block'}}>
                ⚡ -{ak.penaltyPts} Strafpunkte
              </div>
            )}
          </div>
          <Ring pct={pct} size={72} stroke={7} label={`${Math.round(pct*100)}%`}/>
        </div>
        <div style={{marginTop:16, background:'rgba(255,255,255,0.2)', borderRadius:12, padding:'8px 14px',
          display:'flex', alignItems:'center', gap:8}}>
          <span style={{fontSize:14}}>🎯</span>
          <span style={{fontSize:13, fontWeight:600}}>{ak?.confirmed} von {tasks.length} Aufgaben bestätigt</span>
        </div>
      </div>

      {/* Kids */}
      <div style={{display:'flex', gap:12, marginBottom:18}}>
        {scores.map(k=>(
          <div key={k.id} onClick={()=>setActiveKid(k.id)} style={{
            flex:1, background:'#fff', borderRadius:20, padding:'16px', cursor:'pointer',
            border:`2px solid ${activeKid===k.id ? k.color : 'var(--border)'}`,
            boxShadow: activeKid===k.id ? `0 4px 18px ${k.color}33` : 'var(--shadow)',

            <div style={{fontSize:28, marginBottom:6}}>{k.emoji}</div>

            {k.pending>0 && <div style={{marginTop:6, fontSize:11, fontWeight:700, color:'var(--orange)'}}>⏳ {k.pending} offen</div>}
          </div>
        ))}
        <div style={{
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          background:'#fff', borderRadius:20, padding:'16px', flex:0.7, boxShadow:'var(--shadow)',
          border:'2px solid var(--border)', textAlign:'center',

          {leader ? <>
            <div style={{fontSize:22, marginBottom:4}}>👑</div>

// ── Tasks Screen ──────────────────────────────────────────────
function TasksScreen({ state, setState, activeKid }) {
  const kid = KIDS.find(k=>k.id===activeKid);
  const week = state.weekKey;
  const tasks = state.tasks;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;

  const toggle = useCallback((taskId) => {
    setState(prev => {
      const comp = { ...prev.completions[activeKid] };
      const cur = comp[taskId];
      if(cur === week+'_pending') { delete comp[taskId]; }
      else if(!cur) { comp[taskId] = week+'_pending'; }
      const next = { ...prev, completions: { ...prev.completions, [activeKid]: comp } };
      saveState(next); return next;
    });
  }, [activeKid, week, setState]);

  const pts = getKidNetPts(state.completions, state.penalties, activeKid, week, tasks, penaltyDefs);
  const penaltyPts = getKidPenaltyPts(state.penalties, activeKid, week, penaltyDefs);
  const activePenalties = getKidActivePenalties(state.penalties, activeKid, week, penaltyDefs);
  const confirmed = getKidConfirmed(state.completions, activeKid, week, tasks).length;
  const pending = getKidPending(state.completions, activeKid, week, tasks).length;

  return (
    <div style={{padding:'0 20px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:20,
        background:kid.light, borderRadius:20, padding:'14px 18px', border:`1.5px solid ${kid.mid}`}}>
        <div style={{width:48, height:48, borderRadius:'50%', background:kid.color,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:'#fff',
          boxShadow:`0 4px 12px ${kid.color}44`}}>{kid.emoji}</div>
        <div>
          <div style={{fontWeight:800, fontSize:16, color:'var(--text)'}}>{kid.name}</div>
          <div style={{fontWeight:700, fontSize:12, color:kid.color}}>{pts} Punkte · {confirmed} bestätigt</div>
          {pending>0 && <div style={{fontWeight:700, fontSize:11, color:'var(--orange)', marginTop:2}}>⏳ {pending} warten auf Eltern-OK</div>}
        </div>
        <div style={{marginLeft:'auto', textAlign:'right'}}>
          <div style={{fontSize:22, fontWeight:900, color:kid.color}}>{pts}P</div>
        </div>
      </div>

      <div style={{background:'var(--orange-light)', border:'1.5px solid var(--orange)', borderRadius:16,
        padding:'10px 14px', marginBottom:16, display:'flex', gap:10, alignItems:'center'}}>
        <span style={{fontSize:18}}>ℹ️</span>
        <div style={{fontWeight:700, fontSize:12, color:'var(--text-2)'}}>
          Aufgabe antippen → wartet auf Eltern-Bestätigung → Punkte werden gutgeschrieben
        </div>
      </div>

      <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>Aufgaben dieser Woche</div>
      {tasks.map((task,i) => {
        const rawStatus = state.completions[activeKid]?.[task.id];
        const status = rawStatus===week+'_confirmed' ? 'confirmed' : rawStatus===week+'_pending' ? 'pending' : 'none';
        return (
          <TaskCard key={task.id} task={task} status={status} color={kid.color}
            light={kid.light} mid={kid.mid} onToggle={toggle} idx={i}/>
        );
      })}

      {activePenalties.length > 0 && (
        <div style={{marginTop:8, marginBottom:12}}>
          <div style={{fontWeight:800, fontSize:14, color:'#dc2626', marginBottom:10}}>⚡ Strafpunkte diese Woche</div>
          {activePenalties.map((p,i) => (
            <div key={p.id} style={{
              display:'flex', alignItems:'center', gap:14,
              background:'#fff5f5', border:'1.5px solid #fecaca',
              borderRadius:18, padding:'12px 16px', marginBottom:8,
              animation:`fadeUp 0.3s ${i*0.05}s ease both`,
            }}>
              <div style={{fontSize:24, width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center',
                background:'#fee2e2', borderRadius:12}}>{p.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700, fontSize:14, color:'#7f1d1d'}}>{p.label}</div>
                <div style={{fontWeight:700, fontSize:12, color:'#dc2626', marginTop:2}}>-{p.pts} Punkte</div>
              </div>
            </div>

          <div style={{background:'#fee2e2', borderRadius:14, padding:'10px 16px',
            display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontWeight:700, fontSize:13, color:'#7f1d1d'}}>Gesamt Strafpunkte</span>
            <span style={{fontWeight:900, fontSize:18, color:'#dc2626'}}>-{penaltyPts}</span>

      {confirmed===tasks.length && tasks.length > 0 && (

// ── App Password Gate ─────────────────────────────────────────
const APP_PW_KEY = 'habits_app_pw';
function getAppPassword() {
  try { const s = localStorage.getItem('habits_settings'); if(s) { const p = JSON.parse(s); if(p.appPassword) return p.appPassword; } } catch(e){}
  return 'familie';
}
function setAppPassword(pw) {
  try { const s = localStorage.getItem('habits_settings'); const obj = s ? JSON.parse(s) : {}; obj.appPassword = pw; localStorage.setItem('habits_settings', JSON.stringify(obj)); } catch(e){}
}

  const [val, setVal] = useState('');

// ── App ───────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = useState(() => sessionStorage.getItem(APP_PW_KEY) === '1');
  const [state, setStateRaw] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('home');
  const [activeKid, setActiveKid] = useState('daniil');
  const [showPin, setShowPin] = useState(false);
  const [parentMode, setParentMode] = useState(false);

  const setState = useCallback((updater) => {
    setStateRaw(prev => {
      const next = typeof updater==='function' ? updater(prev) : updater;
      const cur = getWeekKey();
      const final = next.weekKey !== cur
        ? { ...next, weekKey: cur, completions: {daniil:{}, viktoria:{}} }
        : next;
      saveState(final);
      return final;
    });
  }, []);

  useEffect(() => {
    // Firebase immer starten — unabhängig vom Login-Status
    const timeout = setTimeout(() => {
      setStateRaw(s => s || defaultState());
      setLoading(false);
    }, 8000);

    let handler;
    try {
      handler = fbRef.on('value', snapshot => {
        clearTimeout(timeout);
        const raw = snapshot.val();
        const cur = getWeekKey();
        if (!raw) {
          const def = defaultState();
          fbRef.set(def);
          setStateRaw(def);
        } else {
          // Firebase löscht leere Objekte — immer wiederherstellen
          const data = {
            ...raw,
            tasks: raw.tasks || TASKS_DEF,
            penaltyDefs: raw.penaltyDefs || PENALTIES_DEF,
            settings: raw.settings || { pin:'1234', prize1:'5', prize2:'2' },
            completions: {
              daniil:  (raw.completions && raw.completions.daniil)  || {},
              viktoria:(raw.completions && raw.completions.viktoria) || {},
            },
            penalties: {
              daniil:  (raw.penalties && raw.penalties.daniil)  || {},
              viktoria:(raw.penalties && raw.penalties.viktoria) || {},
            },
          };
          if (data.weekKey !== cur) {
            const reset = { ...data, weekKey: cur, completions: {daniil:{}, viktoria:{}}, penalties: {daniil:{}, viktoria:{}} };
            fbRef.set(reset);
            setStateRaw(reset);
          } else {
            setStateRaw(prev => {
              if (JSON.stringify(prev) === JSON.stringify(data)) return prev;
              return data;
            });
          }
        }
        setLoading(false);
      }, err => {
        clearTimeout(timeout);
        setStateRaw(defaultState());
        setLoading(false);
      });
    } catch(e) {
      clearTimeout(timeout);
      setStateRaw(defaultState());
      setLoading(false);
    }
    return () => { clearTimeout(timeout); try { fbRef.off('value', handler); } catch(e){} };
  }, []);

  if(!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)}/>;

  if (loading) return (
    <div style={{width:'100%', height:'100%', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', background:'var(--bg)', gap:16}}>
      <div style={{fontSize:48}}>🏠</div>
      <div style={{fontWeight:800, fontSize:16, color:'var(--text)'}}>Wird geladen…</div>
      <div style={{width:48, height:48, border:'4px solid var(--border)',
        borderTop:'4px solid var(--d-color)', borderRadius:'50%',
        animation:'spin 0.8s linear infinite'}}/>
    </div>
  );

  const pendingCount = KIDS.reduce((s,k)=>s+getKidPending(state.completions,k.id,state.weekKey,state.tasks).length, 0);

  return (
    <div style={{
      width:'100%', height:'100%', background:'var(--bg)', fontFamily:'Nunito, sans-serif',
      display:'flex', flexDirection:'column', overflow:'hidden', position:'relative',
    }}>
      {/* Top Bar */}
      <div style={{
        padding:'8px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between',
        paddingTop:'max(8px, env(safe-area-inset-top, 8px))',
        flexShrink:0,
      }}>
        <div style={{fontWeight:900, fontSize:18, color:'var(--text)'}}>
          {{home:'Übersicht',tasks:'Aufgaben',rank:'Rangliste'}[tab]}
        </div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}>
          {tab!=='rank' && KIDS.map(k=>(
            <div key={k.id} onClick={()=>setActiveKid(k.id)} style={{
              padding:'6px 14px', borderRadius:20,
              background: activeKid===k.id ? k.color : 'var(--bg)',
              color: activeKid===k.id ? '#fff' : 'var(--text-2)',
              fontWeight:700, fontSize:13, cursor:'pointer', transition:'all 0.2s',
              boxShadow: activeKid===k.id ? `0 4px 12px ${k.color}44` : 'none',
            }}>{k.name}</div>
          ))}
          {/* Parent lock button */}
          <div onClick={()=>setShowPin(true)} style={{
            width:34, height:34, borderRadius:12, background:'var(--bg)',
            display:'flex', alignItems:'center', justifyContent:'center',
            cursor:'pointer', fontSize:16, position:'relative',
          }}>
            🔒
            {pendingCount>0 && (
              <div style={{position:'absolute', top:-4, right:-4, width:16, height:16, borderRadius:'50%',
                background:'var(--orange)', color:'#fff', fontSize:9, fontWeight:900,
                display:'flex', alignItems:'center', justifyContent:'center'}}>
                {pendingCount}
              </div>
            )}
          </div>
        </div>
      </div>

      <div style={{flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch'}}>
        {tab==='home'  && <HomeScreen  state={state} activeKid={activeKid} setActiveKid={setActiveKid}/>}
        {tab==='tasks' && <TasksScreen state={state} setState={setState} activeKid={activeKid}/>}
        {tab==='rank'  && <LeaderboardScreen state={state}/>}
      </div>

      <BottomNav tab={tab} setTab={setTab} activeKid={activeKid}/>

      {showPin && (
        <PinModal
          correctPin={state.settings.pin}
          onSuccess={()=>{ setShowPin(false); setParentMode(true); }}
          onCancel={()=>setShowPin(false)}
        />
      )}

      {parentMode && (
        <ParentScreen state={state} setState={setState} onClose={()=>setParentMode(false)}/>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:24, fontFamily:'Nunito', background:'#fff5f5', minHeight:'100vh'}}>
        <div style={{fontSize:32, marginBottom:12}}>⚠️</div>
        <div style={{fontWeight:900, fontSize:18, color:'#dc2626', marginBottom:8}}>App-Fehler</div>
        <pre style={{fontSize:12, color:'#7f1d1d', whiteSpace:'pre-wrap', background:'#fef2f2', padding:12, borderRadius:8}}>
          {this.state.error.toString()}
        </pre>
      </div>
    );
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
