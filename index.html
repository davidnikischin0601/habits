<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Data ──────────────────────────────────────────────────────
const TASKS_DEF = [
  { id:'dish',    icon:'🍽️', label:'Geschirrspüler ausräumen', pts:5  },
  { id:'room',    icon:'🛏️', label:'Zimmer aufräumen',          pts:10 },
  { id:'trash',   icon:'🗑️', label:'Müll rausbringen',          pts:8  },
  { id:'lawn',    icon:'🌿', label:'Rasen mähen',               pts:20 },
  { id:'vacuum',  icon:'🧹', label:'Staubsaugen',               pts:15 },
  { id:'laundry', icon:'👕', label:'Wäsche aushängen',          pts:10 },
];
const MAX_PTS = TASKS_DEF.reduce((s,t) => s+t.pts, 0);

const TASK_ICONS = [
  '🏠','🛏️','🛋️','🚪','🪟','🧹','🧺','🧼','🧽','🪣','🫧','🧴','🚿','🛁','🧻','🗑️',
  '🍽️','🥄','🍴','🍳','🧃','🍎','🥗','🥛','🫙','🧊','🍞',
  '🌿','🌱','🌻','🌳','💐','🪴','🌵','🍃','🌾',
  '👕','👗','🧦','👔','👚','🧣','🥾',
  '📚','📝','✏️','🎒','📖','🖊️',
  '💡','🔦','🔧','🔩','📦','🛒','🚗','🐕','🐈','💰','⭐','🏆','🎯','🎮','📱','🔑','⚡','🎁','🪴',
];

const PENALTIES_DEF = [
  { id:'p_bed',      icon:'🛌', label:'Bett nicht gemacht',              pts:5  },
  { id:'p_table',    icon:'🍽️', label:'Tisch nicht aufgeräumt',          pts:5  },
  { id:'p_homework', icon:'📚', label:'Hausaufgaben vergessen',           pts:10 },
  { id:'p_phone',    icon:'📱', label:'Handy beim Essen',                 pts:5  },
  { id:'p_light',    icon:'💡', label:'Licht angelassen',                 pts:3  },
  { id:'p_clothes',  icon:'👔', label:'Schmutzige Wäsche nicht im Korb', pts:3  },
];
const KIDS = [
  { id:'daniil',   name:'Daniil',   emoji:'🏆', color:'var(--d-color)', light:'var(--d-light)', mid:'var(--d-mid)' },
  { id:'viktoria', name:'Viktoria', emoji:'⭐', color:'var(--v-color)', light:'var(--v-light)', mid:'var(--v-mid)' },
];

function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  const mon = new Date(d); mon.setDate(diff);
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}

function defaultState() {
  return {
    weekKey: getWeekKey(),
    completions: { daniil:{}, viktoria:{} },
    penalties:   { daniil:{}, viktoria:{} },
    settings: { pin:'1234', prize1:'5', prize2:'2', bonus:'10' },
    tasks: TASKS_DEF,
    penaltyDefs: PENALTIES_DEF,
    kidTaskData: { daniil:{}, viktoria:{} },
  };
}
function saveState(s) {
  fbRef.set(s);
}

// Returns {confirmed, pending} counts for a task completion value
function getTaskStatus(val, weekKey) {
  if (!val) return { confirmed:0, pending:0 };
  if (typeof val === 'string') {
    if (val === weekKey+'_confirmed') return { confirmed:1, pending:0 };
    if (val === weekKey+'_pending')   return { confirmed:0, pending:1 };
    return { confirmed:0, pending:0 };
  }
  if (typeof val === 'object' && val.week === weekKey)
    return { confirmed: val.confirmed||0, pending: val.pending||0 };
  return { confirmed:0, pending:0 };
}
function maxPtsFor(tasks) {
  return tasks.reduce((s,t) => s + t.pts * (t.count||1), 0);
}
function getKidPts(completions, kidId, weekKey, tasks) {
  return tasks.reduce((s,t) => {
    const { confirmed } = getTaskStatus(completions[kidId]?.[t.id], weekKey);
    return s + confirmed * t.pts;
  }, 0);
}
function getKidPenaltyPts(penalties, kidId, weekKey, penaltyDefs) {
  return (penaltyDefs||[]).filter(p => penalties?.[kidId]?.[p.id] === weekKey+'_confirmed').reduce((s,p)=>s+p.pts,0);
}
function getKidNetPts(completions, penalties, kidId, weekKey, tasks, penaltyDefs) {
  return Math.max(0, getKidPts(completions, kidId, weekKey, tasks) - getKidPenaltyPts(penalties, kidId, weekKey, penaltyDefs));
}
function getKidPending(completions, kidId, weekKey, tasks) {
  return tasks.filter(t => getTaskStatus(completions[kidId]?.[t.id], weekKey).pending > 0);
}
function getKidConfirmed(completions, kidId, weekKey, tasks) {
  return tasks.filter(t => {
    const { confirmed } = getTaskStatus(completions[kidId]?.[t.id], weekKey);
    return confirmed >= (t.count||1);
  });
}
function getKidActivePenalties(penalties, kidId, weekKey, penaltyDefs) {
  return (penaltyDefs||[]).filter(p => penalties?.[kidId]?.[p.id] === weekKey+'_confirmed');
}

// ── Confetti ──────────────────────────────────────────────────
function Confetti({ x, y, color, onDone }) {
  const pieces = ['★','●','■','◆','▲','✦'];
  const colors = [color, '#FFD700', '#FF9EBC', '#A0D9FF', '#C4F0C5', '#FFC49B'];
  useEffect(() => { const t = setTimeout(onDone, 1100); return ()=>clearTimeout(t); }, []);
  return (
    <div style={{position:'fixed', left:x, top:y, pointerEvents:'none', zIndex:9999}}>
      {Array.from({length:16}).map((_,i) => (
        <span key={i} style={{
          position:'absolute', fontSize:10+Math.random()*10,
          color: colors[i%colors.length],
          left:(Math.random()-0.5)*100, top:0,
          animation:`confettiFall ${0.65+Math.random()*0.5}s ease-out forwards`,
          animationDelay:`${Math.random()*0.25}s`,
        }}>{pieces[i%pieces.length]}</span>
      ))}
    </div>
  );
}

function FloatingPts({ pts, color }) {
  return (
    <div style={{
      position:'absolute', top:-10, right:10, zIndex:100,
      fontFamily:'Nunito', fontWeight:900, fontSize:17, color,
      animation:'starFloat 0.9s ease-out forwards', pointerEvents:'none',
    }}>+{pts}✨</div>
  );
}

// ── Ring ──────────────────────────────────────────────────────
function Ring({ pct, size=64, stroke=7, label }) {
  const r=(size-stroke)/2, circ=2*Math.PI*r, dash=circ*Math.min(pct,1);
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.9)" strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
        style={{transition:'stroke-dasharray 0.6s ease'}}/>
      <foreignObject x={0} y={0} width={size} height={size}>
        <div xmlns="http://www.w3.org/1999/xhtml"
          style={{width:size, height:size, display:'flex', alignItems:'center', justifyContent:'center',
            transform:'rotate(90deg)', fontSize:11, fontWeight:800, color:'#fff', fontFamily:'Nunito'}}>
          {label}
        </div>
      </foreignObject>
    </svg>
  );
}

// ── PIN Modal ─────────────────────────────────────────────────
function PinModal({ onSuccess, onCancel, correctPin }) {
  const [val, setVal] = useState('');
  const [error, setError] = useState(false);
  const digits = ['1','2','3','4','5','6','7','8','9','','0','⌫'];

  const press = (d) => {
    if(d==='') return;
    if(d==='⌫') { setVal(v=>v.slice(0,-1)); return; }
    const next = val + d;
    if(next.length <= 4) {
      setVal(next);
      if(next.length===4) {
        if(next === correctPin) { setTimeout(()=>onSuccess(), 150); }
        else { setError(true); setTimeout(()=>{ setVal(''); setError(false); }, 700); }
      }
    }
  };

  return (
    <div style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:500,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end',
    }} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#fff', borderRadius:'28px 28px 0 0', padding:'28px 24px 40px',
        width:'100%', maxWidth:480, animation:'slideUp 0.3s ease',
        paddingBottom:'max(40px, env(safe-area-inset-bottom, 40px))',
      }}>
        <div style={{textAlign:'center', marginBottom:24}}>
          <div style={{fontSize:28, marginBottom:8}}>🔒</div>
          <div style={{fontWeight:900, fontSize:18, color:'var(--text)'}}>Eltern-Modus</div>
          <div style={{fontWeight:600, fontSize:13, color:'var(--text-3)', marginTop:4}}>PIN eingeben</div>
        </div>
        {/* Dots */}
        <div style={{display:'flex', gap:16, justifyContent:'center', marginBottom:28, animation: error?'shake 0.4s ease':'none'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{
              width:16, height:16, borderRadius:'50%',
              background: i<val.length ? (error?'var(--v-color)':'var(--d-color)') : 'var(--border)',
              transition:'background 0.15s',
            }}/>
          ))}
        </div>
        {/* Numpad */}
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12}}>
          {digits.map((d,i)=>(
            <button key={i} onClick={()=>press(d)} style={{
              height:60, borderRadius:16, border:'none',
              background: d==='' ? 'transparent' : 'var(--bg)',
              fontSize: d==='⌫' ? 20 : 24, fontWeight:700, fontFamily:'Nunito',
              color:'var(--text)', cursor: d===''?'default':'pointer',
              transition:'transform 0.1s, background 0.1s',
            }}>{d}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App Password Changer (used inside Parent Settings) ────────
function AppPasswordChanger() {
  const [val, setVal] = useState(getAppPassword());
  const [saved, setSaved] = useState(false);
  const save = () => {
    if(val.trim().length >= 3) {
      setAppPassword(val.trim());
      setSaved(true);
      setTimeout(() => setSaved(false), 1800);
    }
  };
  return (
    <div style={{display:'flex', gap:10, alignItems:'center'}}>
      <input
        type="text" value={val} onChange={e=>setVal(e.target.value)}
        style={{
          flex:1, padding:'10px 14px', borderRadius:12,
          border:'1.5px solid var(--border)', background:'var(--bg)',
          fontFamily:'Nunito', fontWeight:700, fontSize:15, color:'var(--text)', outline:'none',
        }}
      />
      <button onClick={save} style={{
        padding:'10px 16px', borderRadius:12, border:'none',
        background: saved ? 'var(--green)' : 'var(--d-color)', color:'#fff',
        fontFamily:'Nunito', fontWeight:800, fontSize:14, cursor:'pointer', transition:'background 0.2s',
      }}>{saved ? '✓' : 'Speichern'}</button>
    </div>
  );
}

// ── Penalty Manager ───────────────────────────────────────────
function PenaltyManager({ state, setState }) {
  const week = state.weekKey;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;
  const [customLabel, setCustomLabel] = useState({});
  const [customPts, setCustomPts] = useState({});
  const [editId, setEditId] = useState(null);
  const [editFields, setEditFields] = useState({});

  const togglePenalty = (kidId, penaltyId) => {
    setState(prev => {
      const cur = prev.penalties?.[kidId]?.[penaltyId];
      const kidPenalties = { ...(prev.penalties?.[kidId] || {}) };
      if (cur === week+'_confirmed') { delete kidPenalties[penaltyId]; }
      else { kidPenalties[penaltyId] = week+'_confirmed'; }
      const next = { ...prev, penalties: { ...(prev.penalties||{}), [kidId]: kidPenalties } };
      saveState(next); return next;
    });
  };

  const startEdit = (p) => {
    setEditId(p.id);
    setEditFields({ icon: p.icon, label: p.label, pts: String(p.pts) });
  };

  const saveEdit = () => {
    setState(prev => {
      const newDefs = (prev.penaltyDefs || PENALTIES_DEF).map(p =>
        p.id === editId ? { ...p, icon: editFields.icon||p.icon, label: editFields.label||p.label, pts: Math.max(1,parseInt(editFields.pts)||p.pts) } : p
      );
      const next = { ...prev, penaltyDefs: newDefs };
      saveState(next); return next;
    });
    setEditId(null);
  };

  const removePenalty = (penaltyId) => {
    setState(prev => {
      const newDefs = (prev.penaltyDefs || PENALTIES_DEF).filter(p => p.id !== penaltyId);
      const penalties = { ...prev.penalties };
      KIDS.forEach(k => {
        if (penalties[k.id]) {
          penalties[k.id] = { ...penalties[k.id] };
          delete penalties[k.id][penaltyId];
        }
      });
      const next = { ...prev, penaltyDefs: newDefs, penalties };
      saveState(next); return next;
    });
  };

  const addCustomPenalty = (kidId) => {
    const label = (customLabel[kidId] || '').trim();
    const pts = Math.max(1, parseInt(customPts[kidId]) || 5);
    if (!label) return;
    const id = 'custom_' + kidId + '_' + Date.now();
    setState(prev => {
      const newDef = { id, icon: '⚡', label, pts, kidId };
      const newDefs = [...(prev.penaltyDefs || PENALTIES_DEF), newDef];
      const kidPenalties = { ...(prev.penalties?.[kidId] || {}), [id]: week+'_confirmed' };
      const next = { ...prev, penaltyDefs: newDefs, penalties: { ...(prev.penalties||{}), [kidId]: kidPenalties } };
      saveState(next); return next;
    });
    setCustomLabel(prev => ({ ...prev, [kidId]: '' }));
    setCustomPts(prev => ({ ...prev, [kidId]: '' }));
  };

  const allDefs = penaltyDefs; // both standard and custom

  return (
    <div>
      {/* All penalty definitions — editable */}
      <div style={{fontWeight:800, fontSize:13, color:'var(--text)', marginBottom:8}}>⚡ Straf-Definitionen bearbeiten</div>
      <div style={{background:'#fff', borderRadius:20, padding:'4px 0', boxShadow:'var(--shadow)', marginBottom:20}}>
        {allDefs.map((p, i) => (
          <div key={p.id}>
            {editId === p.id ? (
              <div style={{padding:'12px 14px', borderBottom: i<allDefs.length-1 ? '1px solid var(--border)':'none',
                background:'#fffbeb'}}>
                <div style={{display:'flex', gap:8, marginBottom:8}}>
                  <input value={editFields.icon} onChange={e=>setEditFields(f=>({...f,icon:e.target.value}))} maxLength={2}
                    style={{width:44, padding:'8px', borderRadius:10, border:'1.5px solid var(--border)', background:'var(--bg)',
                      fontFamily:'Nunito', fontSize:20, textAlign:'center', outline:'none'}}/>
                  <input value={editFields.label} onChange={e=>setEditFields(f=>({...f,label:e.target.value}))}
                    style={{flex:1, padding:'8px 12px', borderRadius:10, border:'1.5px solid var(--border)', background:'var(--bg)',
                      fontFamily:'Nunito', fontWeight:600, fontSize:13, color:'var(--text)', outline:'none'}}/>
                  <input value={editFields.pts} onChange={e=>setEditFields(f=>({...f,pts:e.target.value.replace(/[^0-9]/g,'')}))}
                    style={{width:44, padding:'8px', borderRadius:10, border:'1.5px solid var(--border)', background:'var(--bg)',
                      fontFamily:'Nunito', fontWeight:800, fontSize:13, textAlign:'center', outline:'none'}}/>
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button onClick={saveEdit} style={{flex:1, padding:'8px', borderRadius:10, border:'none',
                    background:'var(--green)', color:'#fff', fontFamily:'Nunito', fontWeight:800, fontSize:13, cursor:'pointer'}}>✓ Speichern</button>
                  <button onClick={()=>setEditId(null)} style={{padding:'8px 14px', borderRadius:10,
                    border:'1.5px solid var(--border)', background:'#fff', fontFamily:'Nunito', fontWeight:700, fontSize:13, cursor:'pointer'}}>Abbrechen</button>
                </div>
              </div>
            ) : (
              <div style={{display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
                borderBottom: i<allDefs.length-1 ? '1px solid var(--border)':'none'}}>
                <span style={{fontSize:20, width:28, textAlign:'center', flexShrink:0}}>{p.icon}</span>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:700, fontSize:13, color:'var(--text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{p.label}</div>
                  <div style={{fontWeight:600, fontSize:11, color:'#dc2626'}}>-{p.pts} Punkte{p.kidId ? ' (nur '+KIDS.find(k=>k.id===p.kidId)?.name+')' : ''}</div>
                </div>
                <button onClick={()=>startEdit(p)} style={{background:'var(--d-light)', border:'1.5px solid var(--d-mid)',
                  borderRadius:8, width:28, height:28, cursor:'pointer', fontSize:13, flexShrink:0,
                  display:'flex', alignItems:'center', justifyContent:'center'}}>✏️</button>
                <button onClick={()=>removePenalty(p.id)} style={{background:'#fff5f5', border:'1.5px solid #fecaca',
                  borderRadius:8, width:28, height:28, cursor:'pointer', fontSize:13, color:'#dc2626', flexShrink:0,
                  display:'flex', alignItems:'center', justifyContent:'center'}}>🗑</button>
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Toggle per kid */}
      {KIDS.map(kid => {
        const active = getKidActivePenalties(state.penalties, kid.id, week, penaltyDefs);
        const totalPts = active.reduce((s,p)=>s+p.pts,0);
        return (
          <div key={kid.id} style={{marginBottom:24}}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
              <div style={{width:36, height:36, borderRadius:'50%', background:kid.color,
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, color:'#fff'}}>{kid.emoji}</div>
              <div style={{fontWeight:800, fontSize:15, color:'var(--text)', flex:1}}>{kid.name} – Strafen aktivieren</div>
              {totalPts>0 && <div style={{fontWeight:900, fontSize:14, color:'#dc2626'}}>-{totalPts} P</div>}
            </div>
            <div style={{display:'flex', flexDirection:'column', gap:8}}>
              {penaltyDefs.filter(p=>!p.kidId||p.kidId===kid.id).map(p => {
                const isActive = state.penalties?.[kid.id]?.[p.id] === week+'_confirmed';
                return (
                  <div key={p.id} onClick={()=>togglePenalty(kid.id, p.id)} style={{
                    display:'flex', alignItems:'center', gap:12, padding:'12px 14px',
                    borderRadius:16, cursor:'pointer', transition:'all 0.2s',
                    background: isActive ? '#fee2e2' : '#fff',
                    border: `1.5px solid ${isActive ? '#fca5a5' : 'var(--border)'}`,
                  }}>
                    <span style={{fontSize:20}}>{p.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700, fontSize:13, color: isActive?'#7f1d1d':'var(--text)'}}>{p.label}</div>
                      <div style={{fontWeight:600, fontSize:11, color:'#dc2626'}}>-{p.pts} Punkte</div>
                    </div>
                    <div style={{width:26, height:26, borderRadius:'50%', flexShrink:0,
                      background: isActive ? '#dc2626' : 'var(--bg)',
                      border: `2px solid ${isActive ? '#dc2626' : 'var(--border)'}`,
                      display:'flex', alignItems:'center', justifyContent:'center'}}>
                      {isActive && <span style={{color:'#fff', fontSize:13, fontWeight:900}}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Form to add a manual penalty */}
            <div style={{marginTop:10, padding:'12px 14px', background:'#fff7ed',
              borderRadius:16, border:'1.5px dashed #fb923c'}}>
              <div style={{fontWeight:800, fontSize:12, color:'#9a3412', marginBottom:8}}>⚡ Eigene Strafe hinzufügen</div>
              <input
                placeholder="Beschreibung der Strafe..."
                value={customLabel[kid.id] || ''}
                onChange={e => setCustomLabel(prev => ({ ...prev, [kid.id]: e.target.value }))}
                onKeyDown={e => e.key==='Enter' && addCustomPenalty(kid.id)}
                style={{width:'100%', boxSizing:'border-box', padding:'9px 12px', borderRadius:10,
                  border:'1.5px solid #fed7aa', fontFamily:'Nunito', fontSize:13, fontWeight:600,
                  outline:'none', background:'#fff', color:'var(--text)', marginBottom:8}}
              />
              <div style={{display:'flex', gap:8}}>
                <input
                  type="text" inputMode="numeric" placeholder="Punkte"
                  value={customPts[kid.id] || ''}
                  onChange={e => setCustomPts(prev => ({ ...prev, [kid.id]: e.target.value.replace(/[^0-9]/g,'') }))}
                  onKeyDown={e => e.key==='Enter' && addCustomPenalty(kid.id)}
                  style={{width:90, padding:'9px 12px', borderRadius:10, border:'1.5px solid #fed7aa',
                    fontFamily:'Nunito', fontSize:13, fontWeight:700, outline:'none', background:'#fff', color:'var(--text)'}}
                />
                <button onClick={() => addCustomPenalty(kid.id)} style={{
                  flex:1, padding:'9px 0', borderRadius:10, border:'none', background:'#dc2626',
                  color:'#fff', fontFamily:'Nunito', fontWeight:800, fontSize:13, cursor:'pointer',
                }}>Hinzufügen</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Task Manager (inside Parent Settings) ────────────────────
function TaskManager({ state, setState }) {
  const [icon, setIcon] = useState('⭐');
  const [label, setLabel] = useState('');
  const [pts, setPts] = useState('5');
  const [saved, setSaved] = useState(false);
  const [editTask, setEditTask] = useState(null);
  const [localPts, setLocalPts] = useState({});
  const tasks = state.tasks;

  const [count, setCount] = useState('1');
  const [localCount, setLocalCount] = useState({});

  const hasInfo = (taskId) => {
    const ktd = state.kidTaskData || {};
    return KIDS.some(k => {
      const d = ktd[k.id]?.[taskId];
      return !!(d?.notes || '').trim() || (d?.photos || []).length > 0;
    });
  };

  const addTask = () => {
    if(!label.trim()) return;
    const taskCount = Math.max(1, parseInt(count)||1);
    const newTask = { id: 'custom_' + Date.now(), icon: icon.trim() || '⭐', label: label.trim(), pts: Math.max(1, parseInt(pts)||5), count: taskCount };
    setState(prev => {
      const next = { ...prev, tasks: [...prev.tasks, newTask] };
      saveState(next); return next;
    });
    setLabel(''); setPts('5'); setIcon('⭐'); setCount('1');
    setSaved(true); setTimeout(() => setSaved(false), 1500);
  };

  const removeTask = (id) => {
    setState(prev => {
      const next = { ...prev, tasks: prev.tasks.filter(t => t.id !== id) };
      saveState(next); return next;
    });
  };

  const commitPts = (id) => {
    const raw = localPts[id];
    if (raw === undefined) return;
    const num = Math.max(1, parseInt(raw) || 1);
    setState(prev => {
      const next = { ...prev, tasks: prev.tasks.map(t => t.id===id ? {...t, pts: num} : t) };
      saveState(next); return next;
    });
    setLocalPts(p => { const n={...p}; delete n[id]; return n; });
  };

  const commitCount = (id) => {
    const raw = localCount[id];
    if (raw === undefined) return;
    const num = Math.max(1, parseInt(raw) || 1);
    setState(prev => {
      const next = { ...prev, tasks: prev.tasks.map(t => t.id===id ? {...t, count: num} : t) };
      saveState(next); return next;
    });
    setLocalCount(p => { const n={...p}; delete n[id]; return n; });
  };

  const handleEditSave = (taskId, kidData) => {
    setState(prev => {
      const ktd = { ...(prev.kidTaskData || { daniil:{}, viktoria:{} }) };
      KIDS.forEach(k => {
        const d = kidData[k.id] || { notes:'', photos:[] };
        if (!ktd[k.id]) ktd[k.id] = {};
        if ((d.notes||'').trim() || (d.photos||[]).length > 0) {
          ktd[k.id] = { ...ktd[k.id], [taskId]: { notes: d.notes||'', photos: d.photos||[] } };
        } else {
          ktd[k.id] = { ...ktd[k.id] };
          delete ktd[k.id][taskId];
        }
      });
      const next = { ...prev, kidTaskData: ktd };
      saveState(next); return next;
    });
    setEditTask(null);
  };

  return (
    <div>
      {editTask && (
        <TaskEditModal
          task={editTask}
          kidTaskData={state.kidTaskData}
          onClose={()=>setEditTask(null)}
          onSave={(data)=>handleEditSave(editTask.id, data)}
        />
      )}

      {/* Existing tasks */}
      <div style={{background:'#fff', borderRadius:20, padding:'4px 0', boxShadow:'var(--shadow)', marginBottom:16}}>
        {tasks.map((task, i) => {
          const displayPts = task.id in localPts ? localPts[task.id] : String(task.pts);
          return (
            <div key={task.id} style={{display:'flex', alignItems:'center', gap:8, padding:'10px 14px',
              borderBottom: i<tasks.length-1 ? '1px solid var(--border)' : 'none'}}>
              <span style={{fontSize:22, width:32, textAlign:'center', flexShrink:0}}>{task.icon}</span>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontWeight:700, fontSize:13, color:'var(--text)', whiteSpace:'nowrap',
                  overflow:'hidden', textOverflow:'ellipsis'}}>{task.label}</div>
                <div style={{display:'flex', alignItems:'center', gap:4, marginTop:1}}>
                  {(task.count||1) > 1 && <span style={{fontSize:10, fontWeight:800, color:'#fff', background:'var(--d-color)', borderRadius:6, padding:'1px 5px'}}>{task.count}×</span>}
                  {hasInfo(task.id) && <span style={{fontSize:10, fontWeight:600, color:'var(--d-color)'}}>📝📷</span>}
                </div>
              </div>
              <input
                type="text" inputMode="numeric" value={displayPts}
                onChange={e=>setLocalPts(p=>({...p,[task.id]:e.target.value.replace(/[^0-9]/g,'')}))}
                onBlur={()=>commitPts(task.id)}
                onKeyDown={e=>e.key==='Enter'&&commitPts(task.id)}
                style={{width:40, border:'1.5px solid var(--border)', borderRadius:8, padding:'4px 4px',
                  fontFamily:'Nunito', fontWeight:800, fontSize:12, color:'var(--text)',
                  textAlign:'center', outline:'none', background:'var(--bg)', flexShrink:0}}/>
              <span style={{fontSize:11, fontWeight:600, color:'var(--text-3)', flexShrink:0}}>P</span>
              <input
                type="text" inputMode="numeric"
                value={task.id in localCount ? localCount[task.id] : String(task.count||1)}
                onChange={e=>setLocalCount(p=>({...p,[task.id]:e.target.value.replace(/[^0-9]/g,'')}))}
                onBlur={()=>commitCount(task.id)}
                onKeyDown={e=>e.key==='Enter'&&commitCount(task.id)}
                style={{width:28, border:'1.5px solid var(--border)', borderRadius:8, padding:'4px 2px',
                  fontFamily:'Nunito', fontWeight:800, fontSize:12, color:'var(--text)',
                  textAlign:'center', outline:'none', background:'var(--bg)', flexShrink:0}}/>
              <span style={{fontSize:11, fontWeight:600, color:'var(--text-3)', flexShrink:0}}>×</span>
              <button onClick={()=>setEditTask(task)} style={{
                background:'var(--d-light)', border:'1.5px solid var(--d-mid)', borderRadius:8,
                width:30, height:30, cursor:'pointer', fontSize:14, flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>✏️</button>
              <button onClick={()=>removeTask(task.id)} style={{
                background:'#fff5f5', border:'1.5px solid #fecaca', borderRadius:8,
                width:30, height:30, cursor:'pointer', fontSize:14, color:'#dc2626', flexShrink:0,
                display:'flex', alignItems:'center', justifyContent:'center',
              }}>🗑</button>
            </div>
          );
        })}
      </div>

      {/* Add new task */}
      <div style={{background:'#fff', borderRadius:20, padding:'16px', boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:800, fontSize:13, color:'var(--text)', marginBottom:12}}>➕ Neue Aufgabe</div>

        {/* Emoji picker */}
        <div style={{marginBottom:10}}>
          <div style={{fontWeight:700, fontSize:11, color:'var(--text-3)', marginBottom:6}}>Icon wählen</div>
          <div style={{
            display:'flex', flexWrap:'wrap', gap:6, padding:'10px', borderRadius:14,
            border:'1.5px solid var(--border)', background:'var(--bg)', maxHeight:110, overflowY:'auto',
          }}>
            {TASK_ICONS.map(e => (
              <button key={e} onClick={()=>setIcon(e)} style={{
                width:36, height:36, borderRadius:10, border:'none', fontSize:20,
                background: icon===e ? 'var(--d-light)' : 'transparent',
                outline: icon===e ? '2px solid var(--d-color)' : 'none',
                cursor:'pointer', transition:'all 0.15s',
              }}>{e}</button>
            ))}
          </div>
        </div>

        <div style={{display:'flex', gap:8, marginBottom:10}}>
          <div style={{width:48, height:48, borderRadius:12, background:'var(--d-light)', border:'2px solid var(--d-mid)',
            display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, flexShrink:0}}>{icon}</div>
          <input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Aufgabe eingeben..."
            onKeyDown={e=>e.key==='Enter'&&addTask()}
            style={{
              flex:1, padding:'10px 12px', borderRadius:12, border:'1.5px solid var(--border)',
              background:'var(--bg)', fontFamily:'Nunito', fontWeight:600, fontSize:14,
              color:'var(--text)', outline:'none',
            }}/>
        </div>
        <div style={{display:'flex', gap:8}}>
          <div style={{display:'flex', alignItems:'center', gap:4, background:'var(--bg)', borderRadius:12, padding:'0 10px', border:'1.5px solid var(--border)'}}>
            <input type="text" inputMode="numeric" value={pts}
              onChange={e=>setPts(e.target.value.replace(/[^0-9]/g,''))}
              style={{width:36, border:'none', background:'transparent', fontFamily:'Nunito',
                fontWeight:800, fontSize:15, color:'var(--text)', textAlign:'center', outline:'none'}}/>
            <span style={{fontWeight:600, fontSize:12, color:'var(--text-3)'}}>Pkt.</span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:4, background:'var(--bg)', borderRadius:12, padding:'0 10px', border:'1.5px solid var(--border)'}}>
            <input type="text" inputMode="numeric" value={count}
              onChange={e=>setCount(e.target.value.replace(/[^0-9]/g,''))}
              style={{width:28, border:'none', background:'transparent', fontFamily:'Nunito',
                fontWeight:800, fontSize:15, color:'var(--text)', textAlign:'center', outline:'none'}}/>
            <span style={{fontWeight:600, fontSize:12, color:'var(--text-3)'}}>×</span>
          </div>
          <button onClick={addTask} style={{
            flex:1, padding:'10px', borderRadius:12, border:'none',
            background: saved ? 'var(--green)' : 'var(--d-color)', color:'#fff',
            fontFamily:'Nunito', fontWeight:800, fontSize:14, cursor:'pointer', transition:'background 0.2s',
          }}>{saved ? '✓ Gespeichert!' : 'Hinzufügen'}</button>
        </div>
      </div>
    </div>
  );
}

// ── Parent Mode Screen ────────────────────────────────────────
function ParentScreen({ state, setState, onClose }) {
  const [confettis, setConfettis] = useState([]);
  const week = state.weekKey;
  const tasks = state.tasks;
  const [tab, setTab] = useState('pending');

  const allPending = KIDS.flatMap(k =>
    getKidPending(state.completions, k.id, week, tasks).map(t => {
      const { pending } = getTaskStatus(state.completions[k.id]?.[t.id], week);
      return {...t, kid: k, pendingCount: pending || 1};
    })
  );

  const confirm = (kidId, taskId, e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setConfettis(c => [...c, { id: Date.now()+taskId, x: rect.left+rect.width/2, y: rect.top, color: KIDS.find(k=>k.id===kidId).color }]);
    setState(prev => {
      const task = prev.tasks.find(t => t.id === taskId);
      const count = task?.count || 1;
      const comp = { ...prev.completions[kidId] };
      if (count === 1) {
        comp[taskId] = week+'_confirmed';
      } else {
        const { confirmed: c, pending: p } = getTaskStatus(comp[taskId], week);
        if (p > 0) comp[taskId] = { week, confirmed: c+1, pending: p-1 };
      }
      const next = { ...prev, completions: { ...prev.completions, [kidId]: comp } };
      saveState(next); return next;
    });
  };

  const reject = (kidId, taskId) => {
    setState(prev => {
      const task = prev.tasks.find(t => t.id === taskId);
      const count = task?.count || 1;
      const comp = { ...prev.completions[kidId] };
      if (count === 1) {
        delete comp[taskId];
      } else {
        const { confirmed: c, pending: p } = getTaskStatus(comp[taskId], week);
        if (p > 0) {
          if (c === 0 && p === 1) delete comp[taskId];
          else comp[taskId] = { week, confirmed: c, pending: p-1 };
        }
      }
      const next = { ...prev, completions: { ...prev.completions, [kidId]: comp } };
      saveState(next); return next;
    });
  };

  const updatePrize = (key, val) => {
    setState(prev => {
      const next = { ...prev, settings: { ...prev.settings, [key]: val } };
      saveState(next); return next;
    });
  };

  const updatePin = (val) => {
    if(val.length <= 4 && /^\d*$/.test(val)) {
      setState(prev => {
        const next = { ...prev, settings: { ...prev.settings, pin: val } };
        saveState(next); return next;
      });
    }
  };

  const scores = KIDS.map(k => ({
    ...k,
    pts: getKidPts(state.completions, k.id, week, tasks),
    pending: getKidPending(state.completions, k.id, week, tasks).length,
    confirmed: getKidConfirmed(state.completions, k.id, week, tasks).length,
  })).sort((a,b) => b.pts - a.pts);

  return (
    <div style={{position:'fixed', inset:0, background:'var(--bg)', zIndex:400, display:'flex', flexDirection:'column', overflow:'hidden'}}>
      {confettis.map(c => <Confetti key={c.id} x={c.x} y={c.y} color={c.color} onDone={()=>setConfettis(p=>p.filter(x=>x.id!==c.id))}/>)}

      {/* Header */}
      <div style={{background:'#fff', padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:14,
        paddingTop:'max(16px, env(safe-area-inset-top, 16px))'}}>
        <button onClick={onClose} style={{background:'var(--bg)', border:'none', borderRadius:12, width:36, height:36, fontSize:18, cursor:'pointer'}}>←</button>
        <div>
          <div style={{fontWeight:900, fontSize:17, color:'var(--text)'}}>🔓 Eltern-Modus</div>
          <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)'}}>Aufgaben bestätigen & Einstellungen</div>
        </div>
      </div>

      {/* Sub Tabs */}
      <div style={{background:'#fff', padding:'0 20px 12px', display:'flex', gap:8, borderBottom:'1px solid var(--border)'}}>
        {[{id:'pending',label:`⏳ Ausstehend (${allPending.length})`},{id:'penalties',label:'⚡ Strafen'},{id:'tasks',label:'📋 Aufgaben'},{id:'settings',label:'⚙️ Einstellungen'}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            padding:'8px 16px', borderRadius:20, border:'none', fontFamily:'Nunito', fontWeight:700, fontSize:12, cursor:'pointer',
            background: tab===t.id ? 'var(--d-color)' : 'var(--bg)',
            color: tab===t.id ? '#fff' : 'var(--text-2)',
            transition:'all 0.2s',
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1, overflowY:'auto', padding:'16px 20px', WebkitOverflowScrolling:'touch'}}>
        {tab==='pending' && (
          <div>
            {allPending.length === 0 ? (
              <div style={{textAlign:'center', padding:'40px 20px'}}>
                <div style={{fontSize:48, marginBottom:12}}>✅</div>
                <div style={{fontWeight:800, fontSize:17, color:'var(--text)'}}>Alles bestätigt!</div>
                <div style={{fontWeight:600, fontSize:13, color:'var(--text-3)', marginTop:6}}>Keine ausstehenden Aufgaben</div>
              </div>
            ) : (
              <div>
                <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>
                  Warten auf Bestätigung
                </div>
                {allPending.map((item, i) => (
                  <div key={item.kid.id+item.id} style={{
                    background:'#fff', borderRadius:18, padding:'14px 16px', marginBottom:10,
                    border:'1.5px solid var(--orange-light)', boxShadow:'var(--shadow)',
                    animation:`fadeUp 0.3s ${i*0.05}s ease both`,
                  }}>
                    <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:12}}>
                      <div style={{fontSize:26, width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center',
                        background:'var(--orange-light)', borderRadius:12}}>{item.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700, fontSize:14, color:'var(--text)'}}>{item.label}</div>
                        <div style={{display:'flex', alignItems:'center', gap:6, marginTop:3}}>
                          <div style={{width:20, height:20, borderRadius:'50%', background:item.kid.color,
                            display:'flex', alignItems:'center', justifyContent:'center', fontSize:11}}>{item.kid.emoji}</div>
                          <span style={{fontWeight:700, fontSize:12, color:item.kid.color}}>{item.kid.name}</span>
                          <span style={{fontWeight:600, fontSize:12, color:'var(--orange)'}}>· {item.pts} Punkte{item.pendingCount > 1 ? ` · ${item.pendingCount}× offen` : ''}</span>
                        </div>
                      </div>
                    </div>
                    <div style={{display:'flex', gap:8}}>
                      <button onClick={e=>confirm(item.kid.id, item.id, e)} style={{
                        flex:1, padding:'10px', borderRadius:14, border:'none',
                        background:'var(--green)', color:'#fff', fontFamily:'Nunito',
                        fontWeight:800, fontSize:14, cursor:'pointer',
                      }}>{item.pendingCount > 1 ? `✓ 1× (${item.pendingCount} offen)` : '✓ Bestätigen'}</button>
                      <button onClick={()=>reject(item.kid.id, item.id)} style={{
                        flex:1, padding:'10px', borderRadius:14, border:'1.5px solid var(--border)',
                        background:'#fff', color:'var(--text-2)', fontFamily:'Nunito',
                        fontWeight:700, fontSize:14, cursor:'pointer',
                      }}>✗ Ablehnen</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Score overview */}
            <div style={{marginTop:20}}>
              <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>Punktestand</div>
              {scores.map((k, i) => (
                <div key={k.id} style={{background:'#fff', borderRadius:18, padding:'14px 16px', marginBottom:10,
                  border:`1.5px solid ${k.mid}`, animation:`fadeUp 0.3s ${i*0.1}s ease both`}}>
                  <div style={{display:'flex', alignItems:'center', gap:12}}>
                    <div style={{width:44, height:44, borderRadius:'50%', background:k.color,
                      display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, color:'#fff',
                      boxShadow:`0 4px 12px ${k.color}44`}}>{k.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800, fontSize:15, color:'var(--text)'}}>{k.name}</div>
                      <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)', marginTop:2}}>
                        {k.confirmed} bestätigt · {k.pending} ausstehend
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontWeight:900, fontSize:24, color:k.color}}>{k.pts}</div>
                      <div style={{fontWeight:600, fontSize:11, color:'var(--text-3)'}}>Punkte</div>
                    </div>
                  </div>
                  <div style={{marginTop:10, background:'var(--bg)', borderRadius:8, height:8, overflow:'hidden'}}>
                    {(() => { const maxP = maxPtsFor(tasks); return (
                      <div style={{height:'100%', background:k.color, borderRadius:8,
                        width:`${maxP>0?(k.pts/maxP)*100:0}%`, transition:'width 0.6s ease'}}/>
                    ); })()}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==='penalties' && (
          <div>
            <div style={{fontWeight:800, fontSize:14, color:'#dc2626', marginBottom:6}}>⚡ Strafpunkte vergeben</div>
            <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)', marginBottom:16}}>
              Antippen um Strafe zu aktivieren / deaktivieren
            </div>
            <PenaltyManager state={state} setState={setState}/>
          </div>
        )}

        {tab==='tasks' && (
          <div>
            <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>📋 Aufgaben verwalten</div>
            <TaskManager state={state} setState={setState}/>
          </div>
        )}

        {tab==='settings' && (
          <div>

// ── Image compression helper ──────────────────────────────────
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 960;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── TaskCard ──────────────────────────────────────────────────
function TaskCard({ task, confirmed, pending, color, light, mid, onToggle, onInfo, hasInfo, idx }) {
  const [floating, setFloating] = useState(false);
  const [confettiPos, setConfettiPos] = useState(null);
  const ref = useRef(null);
  const count = task.count || 1;
  const isDone = confirmed >= count;
  const isPending = pending > 0 && !isDone;

  const handle = () => {
    if (!isDone) {
      if (pending === 0) {
        const rect = ref.current?.getBoundingClientRect();
        if(rect) setConfettiPos({x:rect.left+rect.width/2, y:rect.top+rect.height/2});
        setFloating(true); setTimeout(()=>setFloating(false),1000);
      }
      onToggle(task.id);
    }
  };
  const bgColor = isDone ? light : isPending ? 'var(--orange-light)' : '#fff';
  const borderColor = isDone ? mid : isPending ? 'var(--orange)' : 'var(--border)';

  return (
    <div ref={ref} style={{position:'relative', animation:`fadeUp 0.35s ${idx*0.06}s ease both`}}>
      {floating && !isDone && !isPending && <FloatingPts pts={task.pts} color={color}/>}
      {confettiPos && <Confetti x={confettiPos.x} y={confettiPos.y} color={color} onDone={()=>setConfettiPos(null)}/>}
      <div onClick={handle} style={{
        display:'flex', alignItems:'center', gap:14,
        background:bgColor, border:`1.5px solid ${borderColor}`,
        borderRadius:18, padding:'14px 16px', marginBottom:10,
        cursor: isDone ? 'default' : 'pointer',
        transition:'all 0.25s', boxShadow: isDone||isPending ? 'none' : 'var(--shadow)',
      }}>
        <div style={{fontSize:26, width:42, height:42, display:'flex', alignItems:'center', justifyContent:'center',
          background: isDone ? mid : isPending ? 'var(--orange-light)' : 'var(--bg)',
          borderRadius:12, transition:'all 0.2s',
        }}>{task.icon}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700, fontSize:15, color:'var(--text)',
            textDecoration: isDone ? 'line-through' : 'none', textDecorationColor:'var(--text-3)'}}>
            {task.label}
          </div>
          <div style={{fontWeight:700, fontSize:12, marginTop:2,
            color: isDone ? color : isPending ? 'var(--orange)' : 'var(--text-3)'}}>
            {task.pts} Punkte
            {count > 1 && <span style={{marginLeft:6, background: isDone?color:isPending?'var(--orange)':'var(--bg)',
              color: isDone||isPending?'#fff':'var(--text-3)', borderRadius:6, padding:'1px 5px', fontWeight:800, fontSize:11}}>
              {confirmed}/{count}
            </span>}
            {isPending ? ' · ⏳ Wartet auf Bestätigung' : isDone ? ' · ✓ Bestätigt' : ''}
          </div>
          {hasInfo && onInfo && (
            <div onClick={e=>{e.stopPropagation(); onInfo(task);}} style={{
              marginTop:7, display:'inline-flex', alignItems:'center', gap:5,
              background:light, border:`1.5px solid ${mid}`,
              borderRadius:10, padding:'5px 11px', cursor:'pointer',
            }}>
              <span style={{fontSize:14}}>📋</span>
              <span style={{fontWeight:800, fontSize:12, color:color}}>Anleitung ansehen</span>
            </div>
          )}
        </div>
        <div style={{
          width:28, height:28, borderRadius:'50%', flexShrink:0,
          border:`2px solid ${isDone ? color : isPending ? 'var(--orange)' : 'var(--border)'}`,
          background: isDone ? color : isPending ? 'var(--orange-light)' : 'transparent',
          display:'flex', alignItems:'center', justifyContent:'center', transition:'all 0.25s',
        }}>
          {isDone && <span style={{color:'#fff', fontSize:13, fontWeight:900, animation:'checkPop 0.3s ease'}}>✓</span>}
          {isPending && <span style={{fontSize:13, animation:'pendingPulse 1.5s infinite'}}>⏳</span>}
        </div>
      </div>
    </div>
  );
}

// ── Tasks Screen ──────────────────────────────────────────────
function TasksScreen({ state, setState, activeKid }) {
  const kid = KIDS.find(k=>k.id===activeKid);
  const week = state.weekKey;
  const tasks = state.tasks;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;
  const [infoTask, setInfoTask] = useState(null);

  const toggle = useCallback((taskId) => {
    setState(prev => {
      const task = prev.tasks.find(t => t.id === taskId);
      const count = task?.count || 1;
      const comp = { ...prev.completions[activeKid] };
      const { confirmed, pending } = getTaskStatus(comp[taskId], week);
      if (count === 1) {
        if (pending > 0) { delete comp[taskId]; }
        else if (confirmed === 0) { comp[taskId] = week+'_pending'; }
      } else {
        if (confirmed >= count) {
          // fully done
        } else if (confirmed + pending < count) {
          comp[taskId] = { week, confirmed, pending: pending+1 };
        } else if (pending > 0) {
          const np = pending - 1;
          if (confirmed === 0 && np === 0) delete comp[taskId];
          else comp[taskId] = { week, confirmed, pending: np };
        }
      }
      const next = { ...prev, completions: { ...prev.completions, [activeKid]: comp } };
      saveState(next); return next;
    });
  }, [activeKid, week, setState]);

  const getKidTaskInfo = (taskId) => {
    const d = state.kidTaskData?.[activeKid]?.[taskId];
    return { notes: d?.notes || '', photos: d?.photos || [] };
  };

  const hasInfo = (taskId) => {
    const d = state.kidTaskData?.[activeKid]?.[taskId];
    return !!(d?.notes || '').trim() || (d?.photos || []).length > 0;
  };

  const pts = getKidNetPts(state.completions, state.penalties, activeKid, week, tasks, penaltyDefs);
  const penaltyPts = getKidPenaltyPts(state.penalties, activeKid, week, penaltyDefs);
  const activePenalties = getKidActivePenalties(state.penalties, activeKid, week, penaltyDefs);
  const confirmed = getKidConfirmed(state.completions, activeKid, week, tasks).length;
  const pending = getKidPending(state.completions, activeKid, week, tasks).length;

  return (
    <div style={{padding:'0 20px 20px'}}>
      <div style={{display:'flex', alignItems:'center', gap:14, marginBottom:20,
        background:kid.light, borderRadius:20, padding:'14px 18px', border:`1.5px solid ${kid.mid}`}}>
        <div style={{width:48, height:48, borderRadius:'50%', background:kid.color,
          display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:'#fff',
          boxShadow:`0 4px 12px ${kid.color}44`}}>{kid.emoji}</div>
        <div>
          <div style={{fontWeight:800, fontSize:16, color:'var(--text)'}}>{kid.name}</div>
          <div style={{fontWeight:700, fontSize:12, color:kid.color}}>{pts} Punkte · {confirmed} bestätigt</div>
          {pending>0 && <div style={{fontWeight:700, fontSize:11, color:'var(--orange)', marginTop:2}}>⏳ {pending} warten auf Eltern-OK</div>}
        </div>
        <div style={{marginLeft:'auto', textAlign:'right'}}>
          <div style={{fontSize:22, fontWeight:900, color:kid.color}}>{pts}P</div>
        </div>
      </div>

      <div style={{background:'var(--orange-light)', border:'1.5px solid var(--orange)', borderRadius:16,
        padding:'10px 14px', marginBottom:16, display:'flex', gap:10, alignItems:'center'}}>
        <span style={{fontSize:18}}>ℹ️</span>
        <div style={{fontWeight:700, fontSize:12, color:'var(--text-2)'}}>
          Aufgabe antippen → wartet auf Eltern-Bestätigung → Punkte werden gutgeschrieben
        </div>
      </div>

      <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>Aufgaben dieser Woche</div>
      {tasks.map((task,i) => {
        const { confirmed, pending } = getTaskStatus(state.completions[activeKid]?.[task.id], week);
        return (
          <TaskCard key={task.id} task={task} confirmed={confirmed} pending={pending} color={kid.color}
            light={kid.light} mid={kid.mid} onToggle={toggle}
            onInfo={setInfoTask}
            hasInfo={hasInfo(task.id)}
            idx={i}/>
        );
      })}

      {infoTask && (() => {
        const { notes, photos } = getKidTaskInfo(infoTask.id);
        return (
          <TaskInfoModal
            task={{...infoTask, notes}}
            photos={photos}
            onClose={()=>setInfoTask(null)}
          />
        );
      })()}

      {activePenalties.length > 0 && (
        <div style={{marginTop:8, marginBottom:12}}>
          <div style={{fontWeight:800, fontSize:14, color:'#dc2626', marginBottom:10}}>⚡ Strafpunkte diese Woche</div>
          {activePenalties.map((p,i) => (
            <div key={p.id} style={{
              display:'flex', alignItems:'center', gap:14,
              background:'#fff5f5', border:'1.5px solid #fecaca',
              borderRadius:18, padding:'12px 16px', marginBottom:8,
              animation:`fadeUp 0.3s ${i*0.05}s ease both`,
            }}>
              <div style={{fontSize:24, width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center',
                background:'#fee2e2', borderRadius:12}}>{p.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700, fontSize:14, color:'#7f1d1d'}}>{p.label}</div>
                <div style={{fontWeight:700, fontSize:12, color:'#dc2626', marginTop:2}}>-{p.pts} Punkte</div>
              </div>
            </div>
          ))}
          <div style={{background:'#fee2e2', borderRadius:14, padding:'10px 16px',
            display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span style={{fontWeight:700, fontSize:13, color:'#7f1d1d'}}>Gesamt Strafpunkte</span>
            <span style={{fontWeight:900, fontSize:18, color:'#dc2626'}}>-{penaltyPts}</span>
          </div>
        </div>
      )}

      {confirmed===tasks.length && tasks.length > 0 && (
        <div style={{textAlign:'center', padding:'20px', marginTop:8,
          background:'var(--green-light)', borderRadius:20, border:'1.5px solid var(--green)', animation:'pop 0.4s ease'}}>
          <div style={{fontSize:40}}>🎉</div>
          <div style={{fontWeight:900, fontSize:18, color:'var(--text)', marginTop:8}}>Alle Aufgaben bestätigt!</div>
          <div style={{fontWeight:600, fontSize:14, color:'var(--text-2)', marginTop:4}}>Fantastische Woche, {kid.name}!</div>
        </div>
      )}
    </div>
  );
}

// ── Leaderboard ───────────────────────────────────────────────
function LeaderboardScreen({ state }) {
  const week = state.weekKey;
  const tasks = state.tasks;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;
  const maxPts = maxPtsFor(tasks);
  const scores = KIDS.map(k=>({
    ...k,
    pts: getKidNetPts(state.completions, state.penalties, k.id, week, tasks, penaltyDefs),
    penaltyPts: getKidPenaltyPts(state.penalties, k.id, week, penaltyDefs),
    confirmed: getKidConfirmed(state.completions, k.id, week, tasks).length,
    pending: getKidPending(state.completions, k.id, week, tasks).length,
  })).sort((a,b)=>b.pts-a.pts);
  const isEqual = scores[0].pts===scores[1].pts;
  const { prize1, prize2, bonus } = state.settings;
  const prizes = [prize1, prize2];
  const bonusAmt = Number(bonus) || 0;

  const [, m, d] = week.split('-');

  return (
    <div style={{padding:'0 20px 20px', animation:'fadeUp 0.4s ease'}}>
      <div style={{textAlign:'center', marginBottom:20}}>

        <div style={{fontWeight:900, fontSize:22, color:'var(--text)', marginTop:6}}>Wochenrangliste</div>

      {/* Podium */}
      <div style={{display:'flex', gap:12, marginBottom:20}}>
        {scores.map((k,i)=>(

            boxShadow: i===0&&!isEqual ? `0 8px 28px ${k.color}33` : 'var(--shadow)',
            border:`2px solid ${i===0&&!isEqual ? k.color : 'var(--border)'}`,
            textAlign:'center', animation:`fadeUp 0.4s ${i*0.1}s ease both`,
          }}>
            <div style={{fontSize:24, marginBottom:6, animation: i===0&&!isEqual ? 'pulse 2s infinite' : 'none'}}>
              {i===0&&!isEqual ? '👑' : '🥈'}
            </div>
            <div style={{width:52, height:52, borderRadius:'50%', background:k.color,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:24, margin:'0 auto 10px', color:'#fff',
              boxShadow:`0 4px 14px ${k.color}44`}}>{k.emoji}</div>
            <div style={{fontWeight:800, fontSize:15, color:'var(--text)'}}>{k.name}</div>
            <div style={{fontWeight:900, fontSize:30, color:k.color, lineHeight:1.1, marginTop:6}}>{k.pts}</div>
            <div style={{fontWeight:600, fontSize:12, color:'var(--text-3)'}}>Punkte</div>
            {k.pending>0 && <div style={{fontSize:11, fontWeight:700, color:'var(--orange)', marginTop:4}}>+{k.pending} ausstehend</div>}
            {k.penaltyPts>0 && <div style={{fontSize:11, fontWeight:700, color:'#dc2626', marginTop:2}}>⚡ -{k.penaltyPts} Strafe</div>}

            {prizes[i] && Number(prizes[i])>0 && (
              maxPts>0 && k.pts>=maxPts*0.8 ? (
                <div style={{marginTop:12, background:'var(--gold-light)', border:'1.5px solid var(--gold)',
                  borderRadius:12, padding:'8px 10px'}}>
                  <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)'}}>Preis 🎉</div>
                  <div style={{fontSize:20, fontWeight:900, color:'var(--gold)'}}>
                    € {i===0&&!isEqual&&bonusAmt>0 ? Number(prizes[i])+bonusAmt : prizes[i]}
                  </div>
                  {i===0&&!isEqual&&bonusAmt>0 && (
                    <div style={{fontSize:10, fontWeight:700, color:'#7c3aed'}}>
                      inkl. €{bonusAmt} Platz-1-Bonus 🏅
                    </div>
                  )}
                  <div style={{fontSize:10, fontWeight:700, color:'var(--text-3)'}}>Taschengeld verdient!</div>
                </div>
              ) : (
                <div style={{marginTop:12, background:'#fff7ed', border:'1.5px solid #fb923c',
                  borderRadius:12, padding:'8px 10px'}}>
                  <div style={{fontSize:10, fontWeight:700, color:'#9a3412'}}>Taschengeld (€{prizes[i]}{i===0&&!isEqual&&bonusAmt>0?` + €${bonusAmt} Bonus`:''})</div>
                  <div style={{fontSize:14, fontWeight:900, color:'#ea580c'}}>
                    noch {Math.max(0, Math.ceil(maxPts*0.8)-k.pts)} Pkt.
                  </div>
                  <div style={{fontSize:9, fontWeight:600, color:'#c2410c'}}>
                    Ziel: 80% = {Math.ceil(maxPts*0.8)} Pkt.
                  </div>

            <div style={{marginTop:10, background:'var(--bg)', borderRadius:8, height:7, overflow:'hidden'}}>
              <div style={{height:'100%', background:k.color, borderRadius:8,
                width:`${maxPts>0?(k.pts/maxPts)*100:0}%`, transition:'width 0.8s ease'}}/>
            </div>
            <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)', marginTop:4}}>
              {k.confirmed}/{tasks.length} bestätigt
            </div>
          </div>
        ))}

      {/* Task breakdown */}
      <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>Aufgaben-Übersicht</div>
      <div style={{background:'#fff', borderRadius:20, padding:'4px 0', boxShadow:'var(--shadow)'}}>
        {tasks.map((task,i)=>(
          <div key={task.id} style={{display:'flex', alignItems:'center', gap:12, padding:'11px 18px',
            borderBottom: i<tasks.length-1 ? '1px solid var(--border)' : 'none'}}>
            <span style={{fontSize:22, width:32, textAlign:'center'}}>{task.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700, fontSize:13, color:'var(--text)'}}>{task.label}</div>
              <div style={{fontWeight:600, fontSize:11, color:'var(--text-3)'}}>{task.pts} Punkte</div>
            </div>
            <div style={{display:'flex', gap:6}}>
              {KIDS.map(k=>{
                const { confirmed: kConf, pending: kPend } = getTaskStatus(state.completions[k.id]?.[task.id], week);
                const taskCount = task.count || 1;
                const isConf = kConf >= taskCount;
                const isPend = kPend > 0 && !isConf;
                return (
                  <div key={k.id} style={{
                    width:28, height:28, borderRadius:'50%',
                    background: isConf ? k.color : isPend ? 'var(--orange-light)' : 'var(--bg)',
                    border:`2px solid ${isConf?k.color:isPend?'var(--orange)':'var(--border)'}`,
                    display:'flex', alignItems:'center', justifyContent:'center', fontSize:11,
                  }}>
                    {isConf ? <span style={{color:'#fff',fontWeight:900}}>✓</span>
                     : isPend ? <span>⏳</span>
                     : taskCount > 1 && kConf > 0 ? <span style={{color:k.color,fontWeight:800,fontSize:9}}>{kConf}</span>
                     : <span style={{color:'var(--text-3)',fontWeight:700}}>{k.name[0]}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:12, display:'flex', gap:16, flexWrap:'wrap'}}>
        {KIDS.map(k=>(
          <div key={k.id} style={{display:'flex', alignItems:'center', gap:5}}>
            <div style={{width:12, height:12, borderRadius:'50%', background:k.color}}/>
            <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>{k.name}</span>
          </div>
        ))}
        <div style={{display:'flex', alignItems:'center', gap:5}}>
          <div style={{width:12, height:12, borderRadius:'50%', background:'var(--orange)'}}/>
          <span style={{fontSize:12, fontWeight:600, color:'var(--text-2)'}}>ausstehend</span>
        </div>
      </div>
    </div>
  );
}

// ── Calendar Screen ───────────────────────────────────────────
function CalendarScreen({ state, activeKid }) {
  const kid = KIDS.find(k => k.id === activeKid);
  const week = state.weekKey;
  const tasks = state.tasks;
  const penaltyDefs = state.penaltyDefs || PENALTIES_DEF;

  const [viewDate, setViewDate] = React.useState(new Date());

  const today = new Date(); today.setHours(0,0,0,0);
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();

  const [wy, wm, wd] = week.split('-').map(Number);
  const weekStart = new Date(wy, wm-1, wd); weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= lastDay.getDate(); d++) cells.push(new Date(year, month, d));

  const isToday = (d) => d && d.getTime() === today.getTime();
  const isInWeek = (d) => d && d >= weekStart && d <= weekEnd;

  const pts = getKidNetPts(state.completions, state.penalties, activeKid, week, tasks, penaltyDefs);
  const confirmedCount = getKidConfirmed(state.completions, activeKid, week, tasks).length;
  const pendingCount = getKidPending(state.completions, activeKid, week, tasks).length;
  const maxPts = maxPtsFor(tasks);

  const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const dayNames = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const weekDayNames = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

  return (
    <div style={{padding:'0 20px 20px', animation:'fadeUp 0.4s ease'}}>

      {/* Today banner */}
      <div style={{
        background:`linear-gradient(135deg, ${kid.color} 0%, ${kid.id==='daniil'?'oklch(52% 0.22 280)':'oklch(52% 0.22 355)'} 100%)`,
        borderRadius:20, padding:'16px 20px', marginBottom:16, color:'#fff',
        boxShadow:`0 6px 20px ${kid.color}44`,
      }}>
        <div style={{fontSize:12, fontWeight:700, opacity:0.8, marginBottom:2}}>{kid.emoji} Heute</div>
        <div style={{fontSize:22, fontWeight:900, lineHeight:1.2}}>
          {weekDayNames[today.getDay()]}, {today.getDate()}. {monthNames[today.getMonth()]} {today.getFullYear()}
        </div>
      </div>

      {/* Month navigation */}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12,
        background:'#fff', borderRadius:20, padding:'12px 16px', boxShadow:'var(--shadow)'}}>
        <button onClick={()=>setViewDate(new Date(year, month-1, 1))} style={{
          background:'var(--bg)', border:'none', borderRadius:10, width:36, height:36,
          fontSize:20, cursor:'pointer', fontWeight:900, color:'var(--text-2)',
        }}>‹</button>
        <div style={{fontWeight:900, fontSize:16, color:'var(--text)'}}>{monthNames[month]} {year}</div>
        <button onClick={()=>setViewDate(new Date(year, month+1, 1))} style={{
          background:'var(--bg)', border:'none', borderRadius:10, width:36, height:36,
          fontSize:20, cursor:'pointer', fontWeight:900, color:'var(--text-2)',
        }}>›</button>
      </div>

      {/* Calendar grid */}
      <div style={{background:'#fff', borderRadius:20, padding:'14px 12px', boxShadow:'var(--shadow)', marginBottom:16}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3, marginBottom:6}}>
          {dayNames.map(d => (
            <div key={d} style={{textAlign:'center', fontSize:10, fontWeight:800, color:'var(--text-3)', padding:'3px 0'}}>{d}</div>
          ))}
        </div>
        <div style={{display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:3}}>
          {cells.map((day, i) => {
            const isTod = isToday(day);
            const inWeek = isInWeek(day);
            const isSat = day && day.getDay() === 6;
            const isSun = day && day.getDay() === 0;
            return (
              <div key={i} style={{
                aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center',
                borderRadius:10,
                background: isTod ? kid.color : inWeek ? kid.light : 'transparent',
                border: isTod ? `2px solid ${kid.color}` : inWeek ? `1.5px solid ${kid.mid}` : '1.5px solid transparent',
                fontWeight: isTod ? 900 : inWeek ? 800 : 500,
                fontSize: 13,
                color: isTod ? '#fff' : inWeek ? kid.color : (isSat||isSun) ? 'var(--text-3)' : day ? 'var(--text)' : 'transparent',
                boxShadow: isTod ? `0 4px 10px ${kid.color}55` : 'none',
                transition:'all 0.2s',
              }}>
                {day ? day.getDate() : ''}
              </div>
            );
          })}
        </div>
        <div style={{display:'flex', gap:12, marginTop:12, paddingTop:10, borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex', alignItems:'center', gap:5}}>
            <div style={{width:12, height:12, borderRadius:4, background:kid.color}}/>
            <span style={{fontSize:10, fontWeight:700, color:'var(--text-3)'}}>Heute</span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:5}}>
            <div style={{width:12, height:12, borderRadius:4, background:kid.light, border:`1.5px solid ${kid.mid}`}}/>
            <span style={{fontSize:10, fontWeight:700, color:'var(--text-3)'}}>Diese Woche</span>
          </div>
        </div>
      </div>

      {/* Week summary */}
      <div style={{background:'#fff', borderRadius:20, padding:'16px 18px', boxShadow:'var(--shadow)', marginBottom:16}}>
        <div style={{fontWeight:800, fontSize:14, color:'var(--text)', marginBottom:12}}>📊 Wochenstand – {kid.name}</div>
        <div style={{display:'flex', gap:10, marginBottom:12}}>
          <div style={{flex:1, background:kid.light, borderRadius:14, padding:'10px 8px', textAlign:'center', border:`1.5px solid ${kid.mid}`}}>
            <div style={{fontSize:24, fontWeight:900, color:kid.color}}>{pts}</div>
            <div style={{fontSize:10, fontWeight:700, color:'var(--text-3)', marginTop:2}}>Punkte</div>
          </div>
          <div style={{flex:1, background:'var(--green-light)', borderRadius:14, padding:'10px 8px', textAlign:'center', border:'1.5px solid var(--green)'}}>
            <div style={{fontSize:24, fontWeight:900, color:'var(--green)'}}>{confirmedCount}</div>
            <div style={{fontSize:10, fontWeight:700, color:'var(--text-3)', marginTop:2}}>bestätigt</div>
          </div>
          <div style={{flex:1, background:'var(--orange-light)', borderRadius:14, padding:'10px 8px', textAlign:'center', border:'1.5px solid var(--orange)'}}>
            <div style={{fontSize:24, fontWeight:900, color:'var(--orange)'}}>{pendingCount}</div>
            <div style={{fontSize:10, fontWeight:700, color:'var(--text-3)', marginTop:2}}>ausstehend</div>
          </div>
        </div>
        <div style={{background:'var(--bg)', borderRadius:8, height:10, overflow:'hidden'}}>
          <div style={{height:'100%', background:kid.color, borderRadius:8,
            width:`${maxPts > 0 ? Math.min(100, (pts/maxPts)*100) : 0}%`, transition:'width 0.8s ease'}}/>
        </div>
        <div style={{fontSize:11, fontWeight:700, color:'var(--text-3)', marginTop:6, textAlign:'center'}}>
          {pts} / {maxPts} Punkte · {maxPts > 0 ? Math.round((pts/maxPts)*100) : 0}% erreicht
        </div>
      </div>

      {/* Week day strip */}
      <div style={{background:'#fff', borderRadius:20, padding:'14px 16px', boxShadow:'var(--shadow)'}}>
        <div style={{fontWeight:800, fontSize:13, color:'var(--text)', marginBottom:12}}>📅 Wochenübersicht</div>
        <div style={{display:'flex', justifyContent:'space-between'}}>
          {['Mo','Di','Mi','Do','Fr','Sa','So'].map((d,i) => {
            const dayDate = new Date(weekStart); dayDate.setDate(weekStart.getDate() + i);
            const isTod = dayDate.getTime() === today.getTime();
            const isPast = dayDate < today;
            return (
              <div key={d} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
                <div style={{fontSize:10, fontWeight:800, color: isTod ? kid.color : 'var(--text-3)'}}>{d}</div>
                <div style={{
                  width:32, height:32, borderRadius:'50%',
                  background: isTod ? kid.color : isPast ? kid.light : 'var(--bg)',
                  border:`2px solid ${isTod ? kid.color : isPast ? kid.mid : 'var(--border)'}`,
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:12,
                  boxShadow: isTod ? `0 4px 10px ${kid.color}44` : 'none',
                }}>
                  {isTod ? '👟' : isPast ? '✓' : ''}
                </div>
                <div style={{fontSize:9, fontWeight:700, color:'var(--text-3)'}}>
                  {dayDate.getDate()}.
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Bottom Nav ────────────────────────────────────────────────

  const items = [{id:'home',icon:'🏠',label:'Übersicht'},{id:'tasks',icon:'✅',label:'Aufgaben'},{id:'rank',icon:'🏆',label:'Rangliste'},{id:'calendar',icon:'📅',label:'Kalender'}];
  return (
    <div style={{
      background:'#fff', borderTop:'1px solid var(--border)',
      display:'flex', paddingTop:8,
      paddingBottom:'max(20px, env(safe-area-inset-bottom, 20px))',
      flexShrink:0,
    }}>
      {items.map(item=>(
        <div key={item.id} onClick={()=>setTab(item.id)} style={{
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer',
        }}>
          <div style={{
            width:44, height:34, borderRadius:12,
            background: tab===item.id ? kid.light : 'transparent',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:20, transition:'all 0.2s',
            transform: tab===item.id ? 'scale(1.1)' : 'scale(1)',
          }}>{item.icon}</div>
          <div style={{
            fontSize:10, fontWeight: tab===item.id ? 800 : 600,

        </div>
      ))}
